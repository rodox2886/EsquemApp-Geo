        const isValidNum = (n) => typeof n === 'number' && !isNaN(n) && isFinite(n);
        const isNodeValid = (el) => el && isValidNum(el.x) && isValidNum(el.y);
        const getRenderX = (x, flipX) => flipX ? -x : x;
        const getRenderY = (y, flipY) => flipY ? y : -y;

        const HIDDEN_CLASSES = [3, 16, 1170, 1232];
        const CT_CLASSES = [1178, 1179, 1183, 1184, 1185, 1186, 1461];
        const SUPPLY_CLASSES = [111, 190, 1373, 27];
        const POLE_CLASSES = [15, 36, 37, 38, 39, 56, 64, 65, 74, 75, 81, 98, 228, 408, 422, 1122, 1123, 1369]; 
        const MT_LINE_CLASSES = [1089, 1091, 1087, 1088]; 
        const MT_POLE_CLASSES = [408, 422, 1119]; 

        const checkStringForMT = (str) => {
            if (!str) return false;
            const upper = String(str).toUpperCase();
            if (upper.includes('GMT')) return true;
            if (upper.includes('PIQUETE')) return true;
            if (upper.includes('LIRA')) return true;
            if (upper.includes('MEDIA TENSI')) return true;
            if (upper.includes('ALTA TENSI')) return true;
            if (/\bMT\b/.test(upper)) return true;
            if (/\bAT\b/.test(upper)) return true;
            if (/\bLAT\b/.test(upper)) return true;
            return false;
        };

        const shouldHideAsMT = (el, classDict = {}) => {
            const cId = Number(el.class);
            
            if ([-3, -2, 1, 1219].includes(cId)) return false;

            if (CT_CLASSES.includes(cId)) return false; 
            if (cId === 52) return false; 
            if (MT_LINE_CLASSES.includes(cId)) return true;
            if (MT_POLE_CLASSES.includes(cId)) return true;
            
            // Eliminamos la clase 36 y 38 de aquí. Solo dejamos el Fusible LIRA (2) y Empalme MT (418)
            if ([2, 418].includes(cId)) return true;
            
            if (el.kv !== undefined && el.kv !== null) {
                const kvNum = Number(String(el.kv).replace(',', '.'));
                if (!isNaN(kvNum) && kvNum > 0.4) return true;
            }
            
            if (checkStringForMT(classDict[cId])) return true;
            
            for (const key in el) {
                if (key.startsWith('_') || key === 'x' || key === 'y' || key === 'id' || key === 'class') continue;
                if (checkStringForMT(key)) return true;
                
                const val = el[key];
                if (typeof val === 'string' || typeof val === 'number') {
                    if (checkStringForMT(String(val))) return true;
                }
            }
            
            if (el.text && Array.isArray(el.text)) {
                for (const t of el.text) {
                    if (t) {
                        if (checkStringForMT(t.tag)) return true;
                        if (checkStringForMT(t.str || t.text || t.val)) return true;
                    }
                }
            }
            
            return false;
        };

        const HARDCODED_ATTRS = {
            "242": { caption: "Calibre Fusible" },
            "243": { caption: "Periodo reportes repo. inter." },
            "244": { caption: "Periodo repo. inter. mensual" },

        // Paleta en escala de grises (usada solo como referencia, el motor fuerza gris ahora)
        const HARDCODED_COLORS = {
            '0.4': "#9ca3af",
            '13.2': "#475569",
            '21': "#475569",
            '27': "#475569",
            '33': "#334155",
            '66': "#1e293b",
            '132': "#0f172a",
            '220': "#020617",
            '500': "#020617",
            'salida_3': "#64748b" 
        };

        const HARDCODED_LINES = {
            'cusmt': [6, 3],
            'casbt': [1, 1],
            'lamt': [],
            'lapt': []
        };

        function App() {
          const canvasRef = useRef(null);
          const fileInputRef = useRef(null);
          const [rawData, setRawData] = useState('');
          const [data, setData] = useState(null);
          const [connectedIds, setConnectedIds] = useState(new Set());
          const [pendingConnectedIds, setPendingConnectedIds] = useState(null);
          const [message, setMessage] = useState(null); 
          const [selectedFeature, setSelectedFeature] = useState(null);
          const [isToolPanelOpen, setIsToolPanelOpen] = useState(true);
          const [viewMode, setViewMode] = useState('input');
          const [transform, setTransform] = useState({ x: 0, y: 0, scale: 1 });
          const [isDragging, setIsDragging] = useState(false);
          const [dragStart, setDragStart] = useState({ x: 0, y: 0 });
          const [exportFlipY, setExportFlipY] = useState(true);
          const [exportFlipX, setExportFlipX] = useState(false);
          const [showMT, setShowMT] = useState(false);
          const [showStreetNames, setShowStreetNames] = useState(false);
          const [highlightConnected, setHighlightConnected] = useState(true);
          const [onlyShowConnected, setOnlyShowConnected] = useState(false);
          const [manualEdits, setManualEdits] = useState({});
          const [draggingFeature, setDraggingFeature] = useState(null);
          const [featureDragInfo, setFeatureDragInfo] = useState(null);
          const [hoveredFeature, setHoveredFeature] = useState(null);
          const [isImportModalOpen, setIsImportModalOpen] = useState(false);
          const [importText, setImportText] = useState('');
          const [isDraggingFile, setIsDraggingFile] = useState(false);
          const [manualSupplyLinks, setManualSupplyLinks] = useState({});
          const [linkingMode, setLinkingMode] = useState(null);
          const [searchQuery, setSearchQuery] = useState('');

          const [streetDictionary, setStreetDictionary] = useState({});
          const [classDictionary, setClassDictionary] = useState(DEFAULT_CLASSES);
          const [classDefDictionary, setClassDefDictionary] = useState({}); 
          const [areaDictionary, setAreaDictionary] = useState({});
          const [graphicsDictionary, setGraphicsDictionary] = useState(HARDCODED_GRAPHICS);
          const [attrDictionary, setAttrDictionary] = useState(HARDCODED_ATTRS);
          const [colorDictionary, setColorDictionary] = useState(HARDCODED_COLORS);
          const [lineDictionary, setLineDictionary] = useState(HARDCODED_LINES);
          
          const [dictRawData, setDictRawData] = useState('');

          const loadDictionariesFromWindow = useCallback((isAutoLoad = false) => {
              let foundStreets = 0, foundClasses = 0, foundAreas = 0, foundGraphics = 0, foundAttrs = 0, foundColors = 0, foundLines = 0;

              if (window.STREETS) {
                  const newStreets = window.STREETS;
                  setStreetDictionary(prev => {
                      let dict = { ...prev };
                      for (let k in newStreets) {
                          if (newStreets[k] && newStreets[k].name) { dict[k] = newStreets[k].name; foundStreets++; }
                      }
                      return dict;
                  });
                  delete window.STREETS;
              }

              if (window.CLASSES) {
                  const newClasses = window.CLASSES;
                  setClassDictionary(prev => {
                      let dict = { ...prev };
                      for (let k in newClasses) { if (newClasses[k] && newClasses[k].description) dict[k] = newClasses[k].description; }
                      return dict;
                  });
                  setClassDefDictionary(prev => {
                      let dict = { ...prev };
                      for (let k in newClasses) { if (newClasses[k]) { dict[k] = newClasses[k]; foundClasses++; } }
                      return dict;
                  });
                  delete window.CLASSES;
              }

              if (window.AREANAMES) {
                  const newAreas = window.AREANAMES;
                  setAreaDictionary(prev => {
                      let dict = { ...prev };
                      for (let k in newAreas) { if (newAreas[k] && newAreas[k].name) { dict[k] = newAreas[k].name; foundAreas++; } }
                      return dict;
                  });
                  delete window.AREANAMES;
              }

              if (window.GRAPHICS) {
                  const newGraphics = window.GRAPHICS;
                  setGraphicsDictionary(prev => {
                      let dict = { ...prev };
                      for (let k in newGraphics) { if (newGraphics[k]) { dict[k] = newGraphics[k]; foundGraphics++; } }
                      return dict;
                  });
                  delete window.GRAPHICS;
              }

              if (window.ATTRDEFS) {
                  const newAttrs = window.ATTRDEFS;
                  setAttrDictionary(prev => {
                      let dict = { ...prev };
                      for (let k in newAttrs) { if (newAttrs[k] && newAttrs[k].caption) { dict[k] = newAttrs[k].caption; foundAttrs++; } }
                      return dict;
                  });
                  delete window.ATTRDEFS;
              }

              if (window.CUSTOM_LINE) {
                  const newLines = window.CUSTOM_LINE;
                  setLineDictionary(prev => {
                      let dict = { ...prev };
                      for (let k in newLines) { if (newLines[k] && newLines[k].value) { dict[k] = newLines[k].value; foundLines++; } }
                      return dict;
                  });
                  delete window.CUSTOM_LINE;
              }

              if (window.CROMO_COLORS) {
                  const newColors = window.CROMO_COLORS;
                  setColorDictionary(prev => {
                      let dict = { ...prev };
                      if (newColors.nivelTension && newColors.nivelTension.kv) {
                          for (let k in newColors.nivelTension.kv) { dict[k] = newColors.nivelTension.kv[k]; foundColors++; }
                      }
                      const catSalidas = ['salida', 'alimentador', 'trafoMt', 'trafoBt'];
                      catSalidas.forEach(tipo => {
                          if (newColors[tipo] && newColors[tipo].colors) {
                              for (let k in newColors[tipo].colors) {
                                  const cObj = newColors[tipo].colors[k];
                                  dict['salida_' + k] = typeof cObj === 'string' ? cObj : (cObj.color || cObj.colorHex);
                                  foundColors++;
                              }
                          }
                      });
                      return dict;
                  });
                  delete window.CROMO_COLORS;
              }

              let msgParts = [];
              if (foundStreets > 0) msgParts.push(`${foundStreets} calles`);
              if (foundClasses > 0) msgParts.push(`${foundClasses} clases`);
              if (foundAreas > 0) msgParts.push(`${foundAreas} áreas`);
              if (foundGraphics > 0) msgParts.push(`${foundGraphics} gráficos`);
              if (foundAttrs > 0) msgParts.push(`${foundAttrs} atributos`);
              if (foundLines > 0) msgParts.push(`${foundLines} tipos de línea`);
              if (foundColors > 0) msgParts.push(`${foundColors} colores`);

              if (msgParts.length > 0) {
                  setDictRawData('');
                  setMessage({ text: `¡Diccionarios ${isAutoLoad ? 'auto-cargados al inicio' : 'cargados'}! El visor aprendió: ${msgParts.join(', ')}.`, type: 'success' });
              } else if (!isAutoLoad) {
                  setMessage({ text: 'El archivo se procesó pero no se identificaron diccionarios o formatos soportados.', type: 'error' });
              }
          }, []);

          // Auto-cargar diccionarios al iniciar la app
          useEffect(() => {
              loadDictionariesFromWindow(true);
          }, [loadDictionariesFromWindow]);

          const checkIsCable = useCallback((el) => {
              if (!el) return false;
              const cId = Number(el.class);
              
              if (POLE_CLASSES.includes(cId) || CT_CLASSES.includes(cId) || SUPPLY_CLASSES.includes(cId) || [1113, 1116, 1119, 52, 2, 418].includes(cId)) {
                  return false;
              }

              if ([1089, 1091, 1093, 1094, 1095, 1096, 1097, 1098, 1099, 1087].includes(cId) || el.class === 'Puente') return true;
              
              const cDef = classDefDictionary[String(cId)];
              if (cDef) {
                  if (cDef.type === 'L' || cDef.type === 'C') return true;
                  if (cDef.type === 'E' || cDef.type === 'V' || cDef.type === 'M' || cDef.type === 'S' || cDef.type === 'N') return false;
              }
              
              if (el._stdCoords && el._stdCoords.length >= 4 && el.closed !== 1 && ![-3, -2, 1, 1219].includes(cId)) {
                  return true;
              }
              return false;
          }, [classDefDictionary]);

          const handleManualEdit = useCallback((id, field, value) => {
            setManualEdits(prev => ({
              ...prev,
              [id]: { ...(prev[id] || { dx: 0, dy: 0, rot: 0 }), [field]: parseFloat(value) || 0 }
            }));
          }, []);

          const removeManualLink = useCallback((fid) => {
              setManualSupplyLinks(prev => {
                  const next = { ...prev };
                  if (next[fid]) delete next[fid];
                  const keysToRemove = Object.keys(next).filter(k => next[k] === fid);
                  keysToRemove.forEach(k => delete next[k]);
                  return next;
              });
          }, []);

          const currentManualLink = useMemo(() => {
              if (!selectedFeature) return null;
              const fid = String(selectedFeature.id);
              if ([111, 190, 1373].includes(selectedFeature.class)) return manualSupplyLinks[fid] || null;
              else if ([1122, 1123, 1369].includes(selectedFeature.class)) return Object.keys(manualSupplyLinks).find(k => String(manualSupplyLinks[k]) === fid) || null;
              return null;
          }, [selectedFeature, manualSupplyLinks]);

          const handleSearch = useCallback((e) => {
              e.preventDefault();
              if (!data || !searchQuery) return;
              
              const q = searchQuery.toLowerCase().trim();
              setMessage(null);

              let found = data.elements.find(el => {
                  if (String(el.id).toLowerCase() === q) return true;
                  if (el.ni && String(el.ni).toLowerCase() === q) return true;
                  if (el.class === -2 || el.class === -3) {
                      const sName = streetDictionary[el.street || el.st];
                      if (sName && sName.toLowerCase().includes(q)) return true;
                  }
                  return false;
              });

              if (found) {
                  setSelectedFeature(found);
                  let cx = 0, cy = 0;
                  
                  if (found._stdCoords && found._stdCoords.length >= 2) {
                      let sx = 0, sy = 0;
                      const pts = found._stdCoords.length / 2;
                      for(let i=0; i < found._stdCoords.length; i+=2) {
                          sx += found._stdCoords[i];
                          sy += found._stdCoords[i+1];
                      }
                      cx = sx / pts; cy = sy / pts;
                  } else if (isValidNum(found.x)) {
                      cx = found.x; cy = found.y;
                  }

                  if (cx && cy) {
                      const w = canvasRef.current.clientWidth;
                      const h = canvasRef.current.clientHeight;
                      const targetScale = 18; 
                      const rx = getRenderX(cx, exportFlipX);
                      const ry = getRenderY(cy, exportFlipY);
                      
                      setTransform({
                          scale: targetScale,
                          x: w/2 - (rx * targetScale),
                          y: h/2 - (ry * targetScale)
                      });
                      setViewMode('map');
                      setSearchQuery('');
                  }
              } else {
                  setMessage({ text: `No se encontró ningún elemento o calle con el texto "${searchQuery}".`, type: 'error' });
              }
          }, [data, searchQuery, streetDictionary, exportFlipX, exportFlipY]);

          const adjMap = useMemo(() => {
            if (!data) return {};
            const adj = {}, initAdj = (id) => { if (!adj[id]) adj[id] = new Set(); };
            data.elements.forEach(el => initAdj(String(el.id)));
            data.elements.forEach(el => {
                if (el.class === 1113 && el.master != null) {
                    const eid = String(el.id), mid = String(el.master);
                    initAdj(eid); initAdj(mid); adj[eid].add(mid); adj[mid].add(eid);
                }
            });
            const connectionPoints = [];
            data.elements.forEach(el => {
                const eid = String(el.id);
                if (el._stdCoords && checkIsCable(el) && el._stdCoords.length >= 4) {
                    connectionPoints.push({ id: eid, x: el._stdCoords[0], y: el._stdCoords[1] }); 
                    connectionPoints.push({ id: eid, x: el._stdCoords[el._stdCoords.length - 2], y: el._stdCoords[el._stdCoords.length-1] }); 
                } else if (isNodeValid(el)) {
                    connectionPoints.push({ id: eid, x: el.x, y: el.y });
                }
            });
            const TOLERANCE_SQ = 1.0, CELL = 10, grid = {};
            connectionPoints.forEach(p => {
                const key = `${Math.round(p.x / CELL)},${Math.round(p.y / CELL)}`;
                if (!grid[key]) grid[key] = []; grid[key].push(p);
            });
            connectionPoints.forEach(p1 => {
                const gx = Math.round(p1.x / CELL), gy = Math.round(p1.y / CELL);
                for (let dx = -1; dx <= 1; dx++) {
                    for (let dy = -1; dy <= 1; dy++) {
                        const key = `${gx+dx},${gy+dy}`;
                        if (grid[key]) grid[key].forEach(p2 => {
                            if (p1.id !== p2.id && ((p1.x - p2.x)**2 + (p1.y - p2.y)**2 <= TOLERANCE_SQ)) {
                                adj[p1.id].add(p2.id); adj[p2.id].add(p1.id);

                }
            });
            return adj;
          }, [data, checkIsCable]);

          const getStreetAngleAt = useCallback((x, y) => {
            if (!data) return 0;
            let streetAngle = 0, minStreetDist = Infinity;
            data.elements.forEach(o => {
              if (o._stdCoords && [-3, -2, 1].includes(o.class)) {
                for (let i = 0; i < o._stdCoords.length - 3; i += 2) {
                  const x0 = o._stdCoords[i], y0 = o._stdCoords[i+1], x1 = o._stdCoords[i+2], y1 = o._stdCoords[i+3];
                  const dx = x1 - x0, dy = y1 - y0, lenSq = dx*dx + dy*dy;
                  if (lenSq < 1e-6) continue;
                  const t = Math.max(0, Math.min(1, ((x - x0) * dx + (y - y0) * dy) / lenSq));
                  const d = Math.hypot(x - (x0 + t * dx), y - (y0 + t * dy));
                  if (d < minStreetDist) { minStreetDist = d; streetAngle = Math.atan2(exportFlipY ? dy : -dy, exportFlipX ? -dx : dx) * 180 / Math.PI; }
                }
              }
            });
            return streetAngle;
          }, [data, exportFlipY, exportFlipX]);

          const pairedFeatureId = useMemo(() => {
              if (!data || !selectedFeature) return null;
              const fid = String(selectedFeature.id);
              if ([111, 190, 1373].includes(selectedFeature.class) && manualSupplyLinks[fid]) return manualSupplyLinks[fid];
              if ([1122, 1123, 1369].includes(selectedFeature.class)) {

                  if (sId) return sId;

              if (![1122, 1123, 1369, 111, 190].includes(selectedFeature.class)) return null;

              if ([1122, 1123, 1369].includes(selectedFeature.class)) seedPillar = selectedFeature;

              if (seedPillar) {
                  const clusterP = new Set([String(seedPillar.id)]);
                  let added = true;
                  while (added) {

                      data.elements.forEach(e => {
                          if ([1122, 1123, 1369].includes(e.class) && !clusterP.has(String(e.id))) {
                              const isNear = Array.from(clusterP).some(pid => {

                                  return p && Math.hypot(e.x - p.x, e.y - p.y) < 4.0;
                              });
                              if (isNear) { clusterP.add(String(e.id)); added = true; }
                          }
                      });
                  }
                  
                  const allClusterPillars = Array.from(clusterP).map(id => data.elements.find(e => String(e.id) === String(id)));
                  const clusterPillars = allClusterPillars.filter(p => {
                      if (!p || typeof p !== 'object' || p.cc == null) return false;
                      const ccStr = String(p.cc).trim().toLowerCase();
                      return ccStr !== '' && ccStr !== '0' && ccStr !== 'no';
                  });
                  const N = clusterPillars.length;

                  if (N > 0) {

                      allSupplies = allSupplies.filter(s => {
                          const linkedPillarId = manualSupplyLinks[String(s.id)];
                          if (!linkedPillarId) return true; 
                          return clusterP.has(String(linkedPillarId)); 
                      });
                      allSupplies.sort((a, b) => {
                          const distA = Math.min(...clusterPillars.map(p => Math.hypot(a.x - p.x, a.y - p.y)));
                          const distB = Math.min(...clusterPillars.map(p => Math.hypot(b.x - p.x, b.y - p.y)));
                          return distA - distB;
                      });
                      const clusterSupplies = allSupplies.slice(0, N);
                      if (clusterPillars.length > 0 && clusterSupplies.length > 0) {
                          let dx = Math.max(...clusterPillars.map(p => p.x)) - Math.min(...clusterPillars.map(p => p.x));
                          let dy = Math.max(...clusterPillars.map(p => p.y)) - Math.min(...clusterPillars.map(p => p.y));
                          if (dx < 0.1 && dy < 0.1 && clusterSupplies.length > 1) {
                              dx = Math.max(...clusterSupplies.map(s => s.x)) - Math.min(...clusterSupplies.map(s => s.x));
                              dy = Math.max(...clusterSupplies.map(s => s.y)) - Math.min(...clusterSupplies.map(s => s.y));
                          }
                          const useX = dx > dy;
                          const sortFn = (a, b) => {
                              if (useX) {
                                  if (Math.abs(a.x - b.x) > 0.1) return a.x - b.x;
                                  if (Math.abs(a.y - b.y) > 0.1) return a.y - b.y;
                                  return String(a.id).localeCompare(String(b.id));
                              } else {
                                  if (Math.abs(a.y - b.y) > 0.1) return a.y - b.y;
                                  if (Math.abs(a.x - b.x) > 0.1) return a.x - b.x;
                                  return String(a.id).localeCompare(String(b.id));
                              }
                          };
                          clusterPillars.sort(sortFn); clusterSupplies.sort(sortFn);
                          if ([1122, 1123, 1369].includes(selectedFeature.class)) {
                              const myIndex = clusterPillars.findIndex(p => String(p.id) === fid);
                              if (myIndex !== -1 && clusterSupplies[myIndex]) return String(clusterSupplies[myIndex].id);
                          } else {
                              const myIndex = clusterSupplies.findIndex(s => String(s.id) === fid);
                              if (myIndex !== -1 && clusterPillars[myIndex]) return String(clusterPillars[myIndex].id);
                          }
                      }
                  }
              }
              return null;
          }, [data, selectedFeature, manualSupplyLinks]);

          const handleTrace = useCallback((mode) => {
              if (!data || !selectedFeature) return;
              const startId = String(selectedFeature.id), newConnected = new Set();
              newConnected.add(startId);
              let traceStartNodeId = pairedFeatureId ? pairedFeatureId : startId;
              if (pairedFeatureId && [1122, 1123, 1369].includes(selectedFeature.class)) traceStartNodeId = startId;

              if (mode === 'continuity') {
                  const startChain0 = selectedFeature.chain && selectedFeature.chain.length > 0 ? selectedFeature.chain[0] : null;
                  const startClass = selectedFeature.class;
                  const queue = [traceStartNodeId];
                  while (queue.length > 0) {
                      const curr = queue.shift();
                      if (adjMap[curr]) adjMap[curr].forEach(neighborId => {
                          if (!newConnected.has(neighborId)) {

                              if (neighborEl && ((startChain0 && neighborEl.chain && neighborEl.chain[0] === startChain0) || (!startChain0 && neighborEl.class === startClass))) {
                                  newConnected.add(neighborId); queue.push(neighborId);
                              }
                          }
                      });
                  }
              } else if (mode === 'downstream') {
                  const elMap = new Map(data.elements.map(e => [String(e.id), e]));
                  let targetPath = null;
                  const queue = [[traceStartNodeId]], visited = new Set([traceStartNodeId]);

                      const path = queue.shift(), currId = path[path.length - 1], el = elMap.get(currId);
                      if (el && (el.class === 1113 || CT_CLASSES.includes(el.class))) { targetPath = path; break; }
                      if (adjMap[currId]) {
                          for (const neighborId of adjMap[currId]) {
                              if (!visited.has(neighborId)) { visited.add(neighborId); queue.push([...path, neighborId]); }
                          }
                      }
                  }
                  if (targetPath) {
                      targetPath.forEach(id => newConnected.add(id));
                      const lastEl = elMap.get(targetPath[targetPath.length - 1]);
                      if (lastEl && lastEl.class === 1113 && lastEl.master) newConnected.add(String(lastEl.master));
                  }

                  const addChains = (id) => {
                      const el = data.elements.find(e => String(e.id) === String(id));
                      if (el && el.chain && Array.isArray(el.chain)) el.chain.forEach(cid => newConnected.add(String(cid)));
                  };
                  addChains(startId);
                  if (pairedFeatureId) addChains(pairedFeatureId);

          }, [data, adjMap, selectedFeature, pairedFeatureId]);

          const getNearestNetworkPoint = useCallback((x, y) => {
            if (!data) return null;
            let nearest = null, bestDist = Infinity;
            const maxSnapDist = 80.0; 
            data.elements.forEach(o => {
              if (!showMT && shouldHideAsMT(o, classDictionary)) return; 
              if (o._stdCoords && checkIsCable(o)) {
                for (let i = 0; i < o._stdCoords.length - 3; i += 2) {
                  const x0 = o._stdCoords[i], y0 = o._stdCoords[i+1], x1 = o._stdCoords[i+2], y1 = o._stdCoords[i+3];
                  const dx = x1 - x0, dy = y1 - y0, lenSq = dx * dx + dy * dy;
                  if (lenSq < 1e-6) continue;
                  const t = Math.max(0, Math.min(1, ((x - x0) * dx + (y - y0) * dy) / lenSq));
                  const px = x0 + t * dx, py = y0 + t * dy, dist = Math.hypot(x - px, y - py);
                  if (dist < bestDist) { bestDist = dist; nearest = { x: px, y: py }; }

          }, [data, showMT, classDictionary, checkIsCable]);

          const computeCtOrientation = useCallback((el) => {
            if (!data) return { rotation: 0 };
            const basePos = { x: el.x, y: el.y };

            let bx = 0, by = 0, bcount = 0;
            data.elements.forEach(o => {
                if (o.class === 1113 && String(o.master) === String(el.id)) {
                    const edit = manualEdits[o.id] || { dx: 0, dy: 0, rot: 0 };
                    bx += o.x + edit.dx; 
                    by += o.y + edit.dy; 
                    bcount++;
                }
            });

            if (bcount > 0) {
                const cbx = bx / bcount, cby = by / bcount;
                const relX = exportFlipX ? -(cbx - basePos.x) : (cbx - basePos.x);
                const relY = exportFlipY ? (cby - basePos.y) : -(cby - basePos.y);
                const angToBornes = Math.atan2(relY, relX) * 180 / Math.PI;
                return { rotation: angToBornes - 90 };
            }

            const streetAngle = getStreetAngleAt(basePos.x, basePos.y);
            let minBlockDist = Infinity, blockCenter = { x: el.x, y: el.y };
            data.elements.forEach(o => {
              if (o.class === 1 && o._stdCoords) {
                let msx = 0, msy = 0, mcnt = 0;
                for (let i = 0; i < o._stdCoords.length - 1; i += 2) { msx += o._stdCoords[i]; msy += o._stdCoords[i+1]; mcnt++; }
                const mcx = msx / mcnt, mcy = msy / mcnt, d = Math.hypot(basePos.x - mcx, basePos.y - mcy);
                if (d < minBlockDist) { minBlockDist = d; blockCenter = { x: mcx, y: mcy }; }
              }
            });
            const relX = exportFlipX ? -(blockCenter.x - basePos.x) : (blockCenter.x - basePos.x);
            const relY = exportFlipY ? (blockCenter.y - basePos.y) : -(blockCenter.y - basePos.y);
            const blockAng = (Math.atan2(relY, relX) * 180 / Math.PI + 360) % 360;
            const angleDiff = (a, b) => { let d = Math.abs((a + 360) % 360 - (b + 360) % 360); return d > 180 ? 360 - d : d; };
            
            const rot1 = streetAngle;
            const rot2 = streetAngle + 180;
            const tipAng1 = rot1 - 90;
            const tipAng2 = rot2 - 90;
            
            return { rotation: (angleDiff(tipAng1, blockAng) < angleDiff(tipAng2, blockAng) ? rot1 : rot2) };
          }, [data, getStreetAngleAt, exportFlipY, exportFlipX, manualEdits]);

          // FUNCIÓN MODIFICADA: ESCALA DE GRISES OBLIGATORIA (NEUTRA)
          const getElementStyle = useCallback((el, isSelected, isHovered) => {

            const dimColor = (c) => (isDimmed && c !== '#e5e5e5') ? '#e5e5e5' : c; // Dimming ultra suave

          const getMouseWorldCoords = useCallback((clientX, clientY) => {

            });

                if ([-2, -3, 1, 1219].includes(el.class)) return; 
                if (isNodeValid(el)) { xs.push(el.x); ys.push(el.y); }
                if (el._stdCoords) {
                    for(let i=0; i<el._stdCoords.length; i+=2) { 
                        if (isValidNum(el._stdCoords[i]) && isValidNum(el._stdCoords[i+1])) {
                            xs.push(el._stdCoords[i]); ys.push(el._stdCoords[i+1]); 
                        }
                    }
                }
            });
            
            xs = xs.filter(isValidNum);
            ys = ys.filter(isValidNum);
            
            if (xs.length === 0 || ys.length === 0) return;
            xs.sort((a,b)=>a-b); ys.sort((a,b)=>a-b);

            let minX = xs[0], maxX = xs[xs.length-1], minY = ys[0], maxY = ys[ys.length-1];
            if (xs.length > 20) {
                const pLow = Math.floor(xs.length * 0.05), pHigh = Math.floor(xs.length * 0.95); 
                minX = xs[pLow]; maxX = xs[pHigh]; minY = ys[pLow]; maxY = ys[pHigh];
            }

            const padX = Math.max((maxX - minX) * 0.1, 15), padY = Math.max((maxY - minY) * 0.1, 15);
            minX -= padX; maxX += padX; minY -= padY; maxY += padY;

            const w = canvasRef.current.clientWidth, h = canvasRef.current.clientHeight;
            if (w === 0 || h === 0) return;
            
            const rx1 = getRenderX(minX, curFlipX), rx2 = getRenderX(maxX, curFlipX);
            const ry1 = getRenderY(minY, curFlipY), ry2 = getRenderY(maxY, curFlipY);
            const rawScale = Math.min(w / (Math.abs(rx2 - rx1) || 50), h / (Math.abs(ry2 - ry1) || 50)) * 0.85; 
            const ns = isValidNum(rawScale) ? rawScale : 1;
            
            if (isValidNum(ns)) {

          }, [showMT, classDictionary]);

          const handleDragOver = useCallback((e) => { 
              e.preventDefault(); 
              setIsDraggingFile(true);

          const handleDragLeave = useCallback((e) => { 
              e.preventDefault(); 
              setIsDraggingFile(false);

          const processDictionaryData = useCallback((text) => {
              setMessage(null);

              try {
                  const safeText = text.replace(/(?:var\s+|let\s+|const\s+)?\b(GRAPHICS|CLASSES|CUSTOM_LINE|STREETS|AREANAMES|ATTRDEFS|CROMO_COLORS)\s*=/g, 'window.$1 =');

            files.forEach(file => {
                const reader = new FileReader();
                reader.onload = (ev) => {
                    const text = ev.target.result;
                    
                    const isDictFile = file.name.toLowerCase().endsWith('.js') ||

                                       /(?:var\s+|let\s+|const\s+)?\b(GRAPHICS|CLASSES|CUSTOM_LINE|STREETS|AREANAMES|ATTRDEFS|CROMO_COLORS)\s*=/.test(text);

          const handleFileUpload = useCallback((e) => {
            const files = Array.from(e.target.files);

                const reader = new FileReader();

                    const text = ev.target.result;
                    
                    const isDictFile = file.name.toLowerCase().endsWith('.js') || 
                                       file.name.toLowerCase().match(/(street|area|class|meta|graphic|color|line)/) ||
                                       /(?:var\s+|let\s+|const\s+)?\b(GRAPHICS|CLASSES|CUSTOM_LINE|STREETS|AREANAMES|ATTRDEFS|CROMO_COLORS)\s*=/.test(text);

          const processData = useCallback((isAppend = false, customText = null) => {
            setMessage(null);
            try {
              let text = (customText !== null ? customText : rawData).trim();

              // Soporte rápido para archivos de recorrido/conectados (sin eval de JS pesado)
              if (/\bRECT\s*=/.test(text)) {
                  const ids = [];
                  const re = /(\d+)\s*:\s*\{\s*idx\s*:\s*[-\d.]+\s*,\s*p\s*:\s*\[/g;
                  let m;
                  while ((m = re.exec(text)) !== null) ids.push(String(m[1]));
                  const uniqueIds = Array.from(new Set(ids));
                  if (uniqueIds.length > 0) {
                      setHighlightConnected(true);
                      setOnlyShowConnected(true);
                      if (data && data.elements && data.elements.length > 0) {
                          setConnectedIds(new Set(uniqueIds));
                          const existingIds = new Set(data.elements.map(e => String(e.id)));
                          const matched = uniqueIds.filter(id => existingIds.has(id)).length;
                          const missing = uniqueIds.length - matched;
                          setMessage({
                              text: matched > 0
                                  ? `Conectados cargados: ${matched}/${uniqueIds.length} IDs encontrados.${missing > 0 ? ` (${missing} no encontrados)` : ''}`
                                  : `Se detectó connected (${uniqueIds.length} IDs) sin coincidencias con el mapa actual.`,
                              type: matched > 0 ? 'success' : 'error'

                      }
                      return;
                  }
              }
              
              if (/(?:var\s+|let\s+|const\s+)?\b(GRAPHICS|CLASSES|CUSTOM_LINE|STREETS|AREANAMES|ATTRDEFS|CROMO_COLORS)\s*=/.test(text)) {
                  processDictionaryData(text);
              }

              const blocks = []; let depth = 0, start = -1;
              for (let i = 0; i < text.length; i++) {
                if (text[i] === '{') { if (depth === 0) start = i; depth++; } 
                else if (text[i] === '}') { if (depth > 0) { depth--; if (depth === 0) blocks.push(text.substring(start, i + 1)); } }
              }
              const localScale = parseFloat((text.match(/scale\s*[:=]\s*([-\d.]+)/) || [0, data?.geo?.scale || 0])[1]);
              const localX1 = parseFloat((text.match(/x1\s*[:=]\s*([-\d.]+)/) || (text.match(/xmin\s*[:=]\s*([-\d.]+)/)) || [0, data?.geo?.x1 || 0])[1]);
              const localY2 = parseFloat((text.match(/y2\s*[:=]\s*([-\d.]+)/) || (text.match(/ymax\s*[:=]\s*([-\d.]+)/)) || [0, data?.geo?.y2 || 0])[1]);
              
              const absX = (v) => (!localScale) ? v : localX1 + (v / localScale);

              blocks.forEach(block => {
                let el = {}; try { el = new Function('return (' + block + ')')() || {}; } catch (e) { return; }

                let coords = ext(/\bc\s*:\s*\[([\s\d.,-]+)\]/) || ext(/\bpoints\s*:\s*['"]([\s\d.,-]+)['"]/) || ext(/\bp\s*:\s*\[([\s\d.,-]+)\]/);
                
                if (coords && coords.length >= 2) {

                    for (let i = 0; i < el._stdCoords.length - 1; i += 2) {

                            validCoords.push(absX(el._stdCoords[i]), absY(el._stdCoords[i+1]));
                        }
                    }
                    el._stdCoords = validCoords;
                }
                
                if (el.text && Array.isArray(el.text)) el.text.forEach(t => { if (t && isValidNum(t.x)) t.x = absX(t.x); if (t && isValidNum(t.y)) t.y = absY(t.y); });
                if (el.from && isValidNum(el.from.x)) { el.from.x = absX(el.from.x); el.from.y = absY(el.from.y); }
                if (el.to && isValidNum(el.to.x)) { el.to.x = absX(el.to.x); el.to.y = absY(el.to.y); }
                
                if ((el.x !== undefined && isValidNum(el.x)) || (el._stdCoords && el._stdCoords.length > 0)) newElements.push(el);
              });

              let combined = [];
              if (isAppend && data) {
                  let offsetX = 0, offsetY = 0, isAligned = false;
                  for (let newEl of newElements) {
                      if (newEl.id != null) {
                          const oldEl = data.elements.find(e => String(e.id) === String(newEl.id));
                          if (oldEl && isValidNum(oldEl.x) && isValidNum(newEl.x)) {
                              offsetX = oldEl.x - newEl.x; offsetY = oldEl.y - newEl.y; isAligned = true; break;
                          }
                      }
                  }

                  if (isAligned && (Math.abs(offsetX) > 0.001 || Math.abs(offsetY) > 0.001)) {
                      newElements.forEach(el => {
                          if (el.x !== undefined) { el.x += offsetX; el.y += offsetY; }
                          if (el._stdCoords) for (let i = 0; i < el._stdCoords.length; i += 2) { el._stdCoords[i] += offsetX; el._stdCoords[i+1] += offsetY; }
                          if (el.text && Array.isArray(el.text)) el.text.forEach(t => { if (t && isValidNum(t.x)) t.x += offsetX; if (t && isValidNum(t.y)) t.y += offsetY; });
                          if (el.from && isValidNum(el.from.x)) { el.from.x += offsetX; el.from.y += offsetY; }
                          if (el.to && isValidNum(el.to.x)) { el.to.x += offsetX; el.to.y += offsetY; }
                      });
                  }
              }

              const uniqueMap = new Map();
              const getGeomHash = (e) => {
                  if (e.id != null && e.id !== "") return String(e.id);
                  if (e._stdCoords && e._stdCoords.length >= 4) {
                      const mid = Math.floor(e._stdCoords.length / 4) * 2;
                      return `g_${e.class}_${Math.round(e._stdCoords[0])}_${Math.round(e._stdCoords[1])}_${Math.round(e._stdCoords[mid])}_${Math.round(e._stdCoords[e._stdCoords.length-2])}`;
                  }
                  if (isValidNum(e.x)) return `g_${e.class}_${Math.round(e.x)}_${Math.round(e.y)}`;
                  return null;
              };

              if (isAppend && data) {
                  data.elements.forEach(el => {
                      const h = getGeomHash(el);
                      if (h) uniqueMap.set(h, el);
                      else combined.push(el);
                  });
              }

              newElements.forEach(el => {
                  const h = getGeomHash(el);
                  if (h) uniqueMap.set(h, el);
                  else combined.push(el);
              });
              combined = [...combined, ...Array.from(uniqueMap.values())];
              
              const processed = { geo: { scale: localScale, x1: localX1, y2: localY2 }, elements: combined, bounds: { minX: 0, maxX: 0, minY: 0, maxY: 0 } };
              setData(processed); 
              if (customText === null) setRawData(''); 
              setViewMode('map'); setIsToolPanelOpen(false); setIsImportModalOpen(false);
              if (!isAppend) setTimeout(() => fitToScreenSafe(processed, exportFlipX, exportFlipY), 50);
              
              setMessage({ text: 'Mapa cargado correctamente.', type: 'success' });
            } catch (err) { setMessage({ text: 'Error procesando el mapa. Revise la consola.', type: 'error' }); console.error(err); }
          }, [rawData, data, exportFlipX, exportFlipY, fitToScreenSafe, processDictionaryData]);

          useEffect(() => {
              if (!pendingConnectedIds || !data || !data.elements || data.elements.length === 0) return;
              setConnectedIds(new Set(pendingConnectedIds));
              setHighlightConnected(true);
              setOnlyShowConnected(true);
              const existingIds = new Set(data.elements.map(e => String(e.id)));
              const matched = pendingConnectedIds.filter(id => existingIds.has(id)).length;
              setMessage({
                  text: `Connected aplicado al mapa: ${matched}/${pendingConnectedIds.length} IDs coinciden.`,
                  type: matched > 0 ? 'success' : 'error'
              });
              setPendingConnectedIds(null);
          }, [pendingConnectedIds, data]);

          const isTraceable = selectedFeature ? (checkIsCable(selectedFeature) || [39, 1122, 1123, 1369, 1113, 190, 1373, 111].includes(selectedFeature.class)) : false;

          const getFeatureClassName = (el) => {
              if (!el) return 'Elemento Desconocido';
              const name = classDictionary[el.class];
              return name ? name : `Clase ${el.class}`;
          };

          useEffect(() => {
            if (!data || viewMode !== 'map' || !canvasRef.current) return;
            const c = canvasRef.current, ctx = c.getContext('2d'), dpr = window.devicePixelRatio || 1, rect = c.getBoundingClientRect();
            c.width = rect.width * dpr; c.height = rect.height * dpr; ctx.scale(dpr, dpr);
            
            // Fondo blanco puro
            ctx.fillStyle = '#ffffff'; ctx.fillRect(0, 0, rect.width, rect.height);
            
            const rx = (x) => transform.x + getRenderX(x, exportFlipX) * transform.scale;
            const ry = (y) => transform.y + getRenderY(y, exportFlipY) * transform.scale;
            
            const drawnTexts = new Set(); 

            const checkAndRegisterText = (text, screenX, screenY, tolerance = 15) => {
                const key = `${text}_${Math.round(screenX/tolerance)}_${Math.round(screenY/tolerance)}`;
                if (drawnTexts.has(key)) return true;
                drawnTexts.add(key);
                return false;
            };

            // 1. CAPA BASE Y CALLES (Escala de grises suaves neutros)
            data.elements.forEach(el => {
              try {
                  if (HIDDEN_CLASSES.includes(el.class) || HIDDEN_CLASSES.includes(Number(el.class))) return; 

                  if (el._stdCoords) {
                      const cDef = classDefDictionary[String(el.class)];
                      const isManzana = el.class === 1 || el.class === 1219 || (cDef && cDef.type === 'M');

                      if (isManzana) {
                          ctx.beginPath(); let m = true;
                          for (let i = 0; i < el._stdCoords.length; i += 2) { const sx = rx(el._stdCoords[i]), sy = ry(el._stdCoords[i+1]); if (m) { ctx.moveTo(sx, sy); m = false; } else ctx.lineTo(sx, sy); }
                          ctx.closePath(); 
                          // Manzanas en gris extra claro neutro
                          ctx.fillStyle = el.class === 1 ? '#fafafa' : '#ffffff'; 
                          ctx.fill(); 
                          ctx.strokeStyle = '#d4d4d4'; 
                          ctx.lineWidth = 0.8; 
                          ctx.stroke();
                      } else if (!checkIsCable(el) && !POLE_CLASSES.includes(el.class) && !CT_CLASSES.includes(el.class)) {
                          // Polilíneas genéricas (e.g. veredas, calles)
                          ctx.beginPath(); let m = true;
                          for (let i = 0; i < el._stdCoords.length; i += 2) { const sx = rx(el._stdCoords[i]), sy = ry(el._stdCoords[i+1]); if (m) { ctx.moveTo(sx, sy); m = false; } else ctx.lineTo(sx, sy); }
                          ctx.strokeStyle = 'rgba(163, 163, 163, 0.4)'; ctx.lineWidth = 1.0; ctx.stroke();
                      }
                  }
              } catch(e) {}
            });

            // 1.5 CAPA DE TEXTOS DE CALLE
            data.elements.forEach(el => {
              try {
                const isStreetElement = el.class === -2 || el.class === -3 || el.class === 1 || el.class === 1219;
                if (isStreetElement && !showStreetNames) return;

                if (el.text && Array.isArray(el.text) && isStreetElement) {
                    el.text.forEach(t => {
                        if (!t) return;
                        const rawTextStr = t.str !== undefined ? t.str : (t.text !== undefined ? t.text : t.val);
                        if (rawTextStr === undefined || rawTextStr === null || String(rawTextStr).trim() === '') return;
                        
                        let displayStr = String(rawTextStr);
                        if (isStreetElement) {
                            if (streetDictionary[displayStr]) displayStr = streetDictionary[displayStr];
                            else if (streetDictionary[Math.round(Number(displayStr))]) displayStr = streetDictionary[Math.round(Number(displayStr))];
                        }
                        
                        if (!isValidNum(t.x) || !isValidNum(t.y)) return;
                        const tx = rx(t.x), ty = ry(t.y);
                        if (!isValidNum(tx) || !isValidNum(ty) || tx < -100 || tx > rect.width + 100 || ty < -100 || ty > rect.height + 100) return;

                        if (checkAndRegisterText(displayStr, tx, ty, 15)) return;

                        ctx.save(); ctx.translate(tx, ty);
                        
                        if (t.ang !== undefined || t.rot !== undefined) {
                            let angDeg = t.ang !== undefined ? t.ang : t.rot;
                            let angleRad = angDeg * Math.PI / 180;
                            if (exportFlipY) angleRad = -angleRad;
                            if (exportFlipX) angleRad = Math.PI - angleRad;
                            ctx.rotate(angleRad);
                        }

                        const baseSize = t.h || t.size || 2.0;
                        const fontSize = Math.max(7.5, baseSize * transform.scale * 1.5); 
                        
                        if (fontSize >= 7.5) {
                            ctx.font = `600 ${fontSize}px "Segoe UI", Arial, sans-serif`;
                            ctx.fillStyle = '#737373'; // Nombres de calle en gris medio neutro
                            ctx.textAlign = 'center'; ctx.textBaseline = 'bottom';
                            ctx.fillText(displayStr, 0, -1);
                        }
                        ctx.restore();
                    });
                }
              } catch(e) {}
            });

            // 1.6 Nombres de Calles Calculadas
            if (showStreetNames) {
                data.elements.forEach(el => {
                  try {
                    if (el.class === -2 && el._stdCoords && el._stdCoords.length >= 4) {
                        let maxLenSq = -1, bestSx1 = 0, bestSy1 = 0, bestSx2 = 0, bestSy2 = 0;
                        for(let i=0; i<el._stdCoords.length-3; i+=2) {
                            const sx1 = rx(el._stdCoords[i]), sy1 = ry(el._stdCoords[i+1]), sx2 = rx(el._stdCoords[i+2]), sy2 = ry(el._stdCoords[i+3]);
                            if (!isValidNum(sx1) || !isValidNum(sy1) || !isValidNum(sx2) || !isValidNum(sy2)) continue;
                            const lenSq = (sx2 - sx1)**2 + (sy2 - sy1)**2;
                            if (lenSq > maxLenSq) { maxLenSq = lenSq; bestSx1 = sx1; bestSy1 = sy1; bestSx2 = sx2; bestSy2 = sy2; }
                        }

                            let angRad = Math.atan2(dy, dx), flipped = false;
                            if (angRad > Math.PI/2 || angRad < -Math.PI/2) { angRad += Math.PI; flipped = true; }

                            let displayStr = null;
                            const streetId = el.street || el.calle || el.st;
                            if (streetId && streetDictionary[String(streetId)]) displayStr = streetDictionary[String(streetId)];
                            else if (el.name && isNaN(Number(el.name))) displayStr = el.name;

                            if (displayStr && len > 30) {
                                const mx = (bestSx1 + bestSx2) / 2, my = (bestSy1 + bestSy2) / 2;
                                if (mx > 0 && mx < rect.width && my > 0 && my < rect.height) {
                                    if (!checkAndRegisterText(displayStr, mx, my, 25)) {
                                        const fontSize = Math.max(7.5, 1.5 * transform.scale); 
                                        if (fontSize >= 7.5 && fontSize < 150) {
                                            ctx.save(); ctx.translate(mx, my); ctx.rotate(angRad);
                                            ctx.font = `${fontSize}px "Segoe UI", Arial, sans-serif`;
                                            ctx.textAlign = 'center'; ctx.textBaseline = flipped ? 'top' : 'bottom';
                                            ctx.fillStyle = '#737373'; ctx.fillText(displayStr, 0, flipped ? 2 : -2); ctx.restore();
                                        }
                                    }
                                }
                            }
                        }
                    }
                  } catch(e) {}
                });
            }

            // 2. CAPA RED DE CABLES / LÍNEAS DE RED
            data.elements.forEach(el => {
              try {
                  if (!showMT && shouldHideAsMT(el, classDictionary)) return; 
                  if (el._stdCoords && checkIsCable(el)) {
                    const isSel = selectedFeature?.id === el.id || pairedFeatureId === String(el.id);
                    const isHov = hoveredFeature?.id === el.id;
                    const s = getElementStyle(el, isSel, isHov);
                    if (onlyShowConnected && !s.isConnected) return;
                    
                    ctx.save(); ctx.globalAlpha = s.opacity; ctx.beginPath(); let m = true;
                    for (let i = 0; i < el._stdCoords.length; i += 2) { 
                        const sx = rx(el._stdCoords[i]), sy = ry(el._stdCoords[i+1]); 
                        if (!isValidNum(sx) || !isValidNum(sy)) continue;
                        if (m) { ctx.moveTo(sx, sy); m = false; } else ctx.lineTo(sx, sy); 
                    }
                    ctx.strokeStyle = s.stroke; 
                    
                    if (el.class === 1097 || el.class === 'Puente') { 
                        ctx.lineWidth = isSel ? 6 : (isHov ? 5 : 4); 
                        ctx.setLineDash([]); 
                    } else {
                        ctx.lineWidth = isSel ? 3.5 : (isHov ? 2.5 : (s.isConnected ? 2.2 : 1.4)); 
                        
                        let dashArray = [];
                        
                        let lineTypeName = el['line-type'] || el.lineType || el.tipoLinea || el.tipo_linea || el.lt;

                        if (!lineTypeName && classDefDictionary[String(el.class)]) {
                            const cDef = classDefDictionary[String(el.class)];
                            lineTypeName = cDef.lt || cDef['line-type'] || cDef.lineType;
                        }

                        if (!lineTypeName) {
                            let gIds = el.gs && el.gs.length > 0 ? el.gs : [el.class];
                            for (let gId of gIds) {
                                const gDef = graphicsDictionary[String(gId)];
                                if (gDef && (gDef['line-type'] || gDef.lineType || gDef.lt)) {
                                    lineTypeName = gDef['line-type'] || gDef.lineType || gDef.lt;
                                    break;
                                }
                            }
                        }

                        if (lineTypeName) {
                            if (lineDictionary[lineTypeName]) {
                                dashArray = lineDictionary[lineTypeName].map(v => v * 5.0);
                            } else if (lineTypeName === 'continuous') {
                                dashArray = []; 
                            }
                        }
                        
                        ctx.setLineDash(dashArray);
                    }
                    ctx.stroke(); 

                    // Nodos grises en los cables con zoom
                    if (transform.scale > 3) {
                        ctx.setLineDash([]); 
                        ctx.fillStyle = '#f5f5f5'; 
                        ctx.strokeStyle = s.stroke; 
                        ctx.lineWidth = 0.8;
                        const dotRadius = isSel ? 3.5 : Math.max(2.0, Math.min(3.5, 0.15 * transform.scale));
                        
                        for (let i = 0; i < el._stdCoords.length; i += 2) {
                            const sx = rx(el._stdCoords[i]);
                            const sy = ry(el._stdCoords[i+1]);
                            if (!isValidNum(sx) || !isValidNum(sy)) continue;
                            
                            ctx.beginPath();
                            ctx.arc(sx, sy, dotRadius, 0, Math.PI * 2);
                            ctx.fill();
                            ctx.stroke();
                        }
                    }

                    ctx.restore();
                  }
              } catch(e) {}
            });

            const renderNode = (el, isHighlightRender = false) => {
              try {
                if (HIDDEN_CLASSES.includes(el.class) || HIDDEN_CLASSES.includes(Number(el.class))) return;
                
                if (!showMT && shouldHideAsMT(el, classDictionary)) return; 
                if (!isNodeValid(el)) return;
                
                const edit = manualEdits[el.id] || { dx: 0, dy: 0, rot: 0 };
                const fx = el.x + (el._autoDx || 0) + edit.dx;
                const fy = el.y + (el._autoDy || 0) + edit.dy;
                const isSel = selectedFeature?.id === el.id || pairedFeatureId === String(el.id);
                const isHov = hoveredFeature?.id === el.id;
                const s = getElementStyle(el, isSel, isHov);
                if (onlyShowConnected && !s.isConnected) return;
                
                if (el.class === 1113 && el.master != null) {
                    const masterEl = data.elements.find(m => String(m.id) === String(el.master));
                    if (masterEl) {
                        if (HIDDEN_CLASSES.includes(masterEl.class) || HIDDEN_CLASSES.includes(Number(masterEl.class))) return;
                    }
                }

                let sx = rx(fx), sy = ry(fy);
                if (!isValidNum(sx) || !isValidNum(sy)) return;

                if (el.class === 52) { 
                    const snap = getNearestNetworkPoint(fx, fy); 
                    if (snap) { sx = rx(snap.x); sy = ry(snap.y); } 
                } 

                const r = Math.max(s.minPixels, s.worldSize * transform.scale);
                
                ctx.save();
                ctx.globalAlpha = s.opacity;
                ctx.translate(sx, sy);
                
                let angleRad = 0;
                let rawAngDeg = null;
                if (el.ang !== undefined) rawAngDeg = el.ang;

                if (rawAngDeg !== null) {
                    let rotRad = (rawAngDeg * Math.PI) / 180;
                    if (exportFlipY) rotRad = -rotRad;
                    if (exportFlipX) rotRad = Math.PI - rotRad;
                    angleRad = rotRad + (edit.rot * Math.PI) / 180;
                } else {
                    if (CT_CLASSES.includes(el.class) || CT_CLASSES.includes(Number(el.class))) {
                        angleRad = ((computeCtOrientation(el).rotation + edit.rot) * Math.PI) / 180;
                    } else if (SUPPLY_CLASSES.includes(el.class) || SUPPLY_CLASSES.includes(Number(el.class))) {
                        angleRad = (edit.rot * Math.PI) / 180;
                    } else {
                        const streetAng = getStreetAngleAt(fx, fy) + edit.rot;
                        angleRad = (streetAng * Math.PI) / 180;
                    }
                }

                if (SUPPLY_CLASSES.includes(el.class) || SUPPLY_CLASSES.includes(Number(el.class))) {
                    ctx.rotate(angleRad);
                    const isPotential = el.class === 1373;
                    
                    ctx.beginPath(); ctx.arc(0, 0, r, 0, 2*Math.PI);
                    if (s.fill) { ctx.fillStyle = s.fill; ctx.fill(); } 
                    ctx.strokeStyle = s.stroke; ctx.lineWidth = isPotential ? 1.5 : 1.2; ctx.stroke();
                    
                    if (isPotential) { 
                        ctx.font = `300 ${Math.round(r * 1.3)}px "Segoe UI", Arial, sans-serif`; 
                        ctx.fillStyle = s.stroke; ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; 
                        ctx.fillText('P', 0, r * 0.05); 
                    } else if (transform.scale > 0.35) {
                        ctx.strokeStyle = s.stroke; ctx.lineWidth = 0.8; 
                        
                        ctx.beginPath(); 
                        ctx.moveTo(-r, 0); ctx.lineTo(r, 0);       
                        ctx.moveTo(0, 0); ctx.lineTo(0, r);       
                        ctx.stroke();
                        
                        ctx.fillStyle = s.isConnected ? '#525252' : '#a3a3a3'; 
                        ctx.textAlign = 'center';
                        
                        ctx.textBaseline = 'bottom';
                        ctx.font = `bold ${Math.max(3, r * 0.6)}px "Segoe UI", sans-serif`;
                        const topText = String(el.alt !== undefined ? el.alt : (el.ni || el.name || 'S/N'));
                        ctx.fillText(topText, 0, -r * 0.05);

                        ctx.textBaseline = 'top';
                        ctx.font = `${Math.max(2.5, r * 0.45)}px "Segoe UI", sans-serif`;
                        
                        const blText = String(el.cc !== undefined ? el.cc : (el.cl !== undefined ? el.cl : (el.fases !== undefined ? el.fases : (el.f !== undefined ? el.f : '1'))));
                        ctx.fillText(blText, -r * 0.45, r * 0.1);

                        const kwVal = el.pc !== undefined ? el.pc : (el.kw !== undefined ? el.kw : (el.pot !== undefined ? el.pot : (el.carga !== undefined ? el.carga : '')));
                        if (kwVal !== '' && Number(kwVal) > 0) {
                            ctx.fillText(String(kwVal), r * 0.45, r * 0.1);
                        }
                    }

                    ctx.restore();
                    return; 
                }

                let graphicIds = el.gs && el.gs.length > 0 ? el.gs : [el.class];
                
                graphicIds.forEach(gId => {
                    const gDef = typeof gId === 'object' ? { type: 1, gs: [gId] } : graphicsDictionary[gId];
                    
                    if (gDef && (gDef.gs || gDef.type === 2)) {
                        ctx.save();
                        ctx.rotate(angleRad);
                        
                        const isCTGraphic = CT_CLASSES.includes(el.class) || CT_CLASSES.includes(Number(el.class)) ||
                                            CT_CLASSES.includes(gId) || CT_CLASSES.includes(Number(gId));
                                            
                        let graphicScale = gDef.scale !== undefined ? gDef.scale : 1.0;
                        const renderScale = (r / (s.worldSize || 1.0)) * graphicScale;
                        
                        ctx.scale(renderScale, -renderScale);

                        if (gDef.type === 2) {
                            ctx.beginPath();
                            ctx.moveTo(-10, 0);
                            ctx.lineTo(10, 0);
                            ctx.strokeStyle = isSel ? '#ef4444' : (isHov ? '#3b82f6' : '#171717');
                            ctx.lineWidth = gDef.scale || (2 / renderScale);
                            if (gDef['line-type'] && gDef['line-type'] !== 'continuous') ctx.setLineDash([5, 5]);
                            ctx.stroke();
                            ctx.setLineDash([]);
                        } else if (gDef.gs) {
                            gDef.gs.forEach(g => {
                                if (!g) return;
                                const attr = g.attr || {};
                                let willStroke = attr.stroke && attr.stroke !== 'none';
                                let willFill = attr.fill && attr.fill !== 'none';

                                if (!willStroke && !willFill) {
                                    willStroke = true;
                                }

                                const isPilar = [1122, 1123, 1369].includes(el.class) || [1122, 1123, 1369].includes(Number(el.class));

                                if (isSel) {
                                    ctx.strokeStyle = '#ef4444'; ctx.fillStyle = '#ef4444';
                                } else if (isHov) {
                                    ctx.strokeStyle = '#3b82f6'; ctx.fillStyle = '#3b82f6';
                                } else {
                                    // Adaptar los colores de los SVG a la paleta monocromática neutra
                                    ctx.strokeStyle = attr.stroke && attr.stroke !== 'none' && attr.stroke !== '#272828' ? attr.stroke : (s.stroke || '#171717');
                                    ctx.fillStyle = attr.fill && attr.fill !== 'none' && attr.fill !== '#ffffff' ? '#d4d4d4' : (s.fill || '#fafafa');
                                    
                                    if (isCTGraphic) {
                                        ctx.strokeStyle = '#171717';
                                        ctx.fillStyle = '#525252';
                                    }
                                    if (isPilar) {
                                        ctx.strokeStyle = '#404040'; 
                                        if (attr.fill === 'none') ctx.fillStyle = '#f5f5f5';
                                    }
                                }

                                let strokeW = attr['stroke-width'];
                                if (strokeW === undefined) strokeW = willStroke ? 0.5 : 0;
                                
                                const minPhysicalPixels = (isCTGraphic || isPilar) ? 1.5 : 1.0;
                                ctx.lineWidth = Math.max(minPhysicalPixels / renderScale, strokeW * (1 / renderScale) * 2.5);
                                if (isPilar || isCTGraphic) willStroke = true; 

                                const originalAlpha = ctx.globalAlpha;
                                if (attr['fill-opacity'] !== undefined && !isSel && !isHov) {
                                    ctx.globalAlpha = originalAlpha * attr['fill-opacity'];
                                }

                                const shapeType = g.type;
                                if (shapeType === 1) { 
                                    ctx.beginPath(); ctx.moveTo(attr.x1 || 0, attr.y1 || 0); ctx.lineTo(attr.x2 || 0, attr.y2 || 0);
                                    if (willStroke) ctx.stroke();
                                } else if (shapeType === 2 || isValidNum(attr.r) || isValidNum(attr.radius)) { 
                                    ctx.beginPath(); ctx.arc(attr.cx || attr.x || 0, attr.cy || attr.y || 0, attr.r || attr.radius || 1, 0, 2*Math.PI);
                                    if (willFill) ctx.fill(); if (willStroke) ctx.stroke();
                                } else if (shapeType === 3 || shapeType === 5 || attr.d) {
                                    if (attr.d) {
                                        const p = new Path2D(attr.d);
                                        if (willFill) ctx.fill(p);
                                        if (willStroke) ctx.stroke(p);
                                    }
                                } else if (shapeType === 4 || attr.text || g.text || attr.textContent || attr.str) {
                                    const textContent = attr.text || g.text || attr.textContent || attr.str;
                                    if (textContent) {
                                        const txtSize = attr['font-size'] || attr.size || 1.5;
                                        const absTxtSize = txtSize * renderScale * 1.5;
                                        ctx.save();
                                        
                                        let flipText = false;
                                        if (isCTGraphic) {
                                            let deg = (angleRad * 180) / Math.PI;
                                            deg = ((deg % 360) + 360) % 360;
                                            if (deg > 90 && deg <= 270) flipText = true;
                                        }

                                        ctx.scale(1/renderScale, -1/renderScale); 
                                        if (flipText) ctx.rotate(Math.PI);
                                        
                                        ctx.font = `bold ${absTxtSize}px "Segoe UI", Arial, sans-serif`;
                                        if (!isSel && !isHov) {
                                            ctx.fillStyle = '#171717';
                                            if (isCTGraphic) ctx.fillStyle = '#ffffff';
                                        }
                                        
                                        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                                        
                                        let txtX = (attr.x || 0) * renderScale;
                                        let txtY = -(attr.y || 0) * renderScale;
                                        if (flipText) { txtX = -txtX; txtY = -txtY; }

                                        ctx.fillText(textContent, txtX, txtY);
                                        ctx.restore();
                                    }
                                } else if (isValidNum(attr.width) && isValidNum(attr.height)) { 
                                    ctx.beginPath(); ctx.rect((attr.x || 0), (attr.y || 0), attr.width, attr.height);
                                    if (willFill) ctx.fill(); if (willStroke) ctx.stroke();
                                } else if (attr.points) {
                                    const pts = attr.points.trim().split(/\s+|,/);
                                    if (pts.length >= 2) {
                                        ctx.beginPath();
                                        for (let i = 0; i < pts.length; i += 2) {
                                            const px = parseFloat(pts[i]), py = parseFloat(pts[i+1]);
                                            if (isValidNum(px) && isValidNum(py)) {
                                                if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
                                            }
                                        }
                                        if (attr.closed) ctx.closePath();
                                        if (willFill) ctx.fill();
                                        if (willStroke) ctx.stroke();
                                    }
                                }
                                ctx.globalAlpha = originalAlpha;
                            });
                        }
                        ctx.restore();
                    }
                });

                ctx.restore(); 

                if (el.text && Array.isArray(el.text) && el.class !== -2 && el.class !== -3 && el.class !== 1) {
                    el.text.forEach(t => {
                        if (!t) return;
                        const rawTextStr = t.str !== undefined ? t.str : (t.text !== undefined ? t.text : t.val);
                        if (rawTextStr === undefined || rawTextStr === null || String(rawTextStr).trim() === '') return;
                        
                        let tx = sx, ty = sy;
                        if (isValidNum(t.x) && isValidNum(t.y)) {
                            tx = rx(t.x + edit.dx); ty = ry(t.y + edit.dy);
                        } else {
                            ty -= r * 1.5; 
                        }

                        if (!isValidNum(tx) || !isValidNum(ty)) return;
                        if (checkAndRegisterText(String(rawTextStr).trim(), tx, ty, 10)) return;

                        ctx.save(); ctx.translate(tx, ty);

                        if (t.ang !== undefined || t.rot !== undefined) {
                            let angDeg = t.ang !== undefined ? t.ang : t.rot;
                            let textAngleRad = (angDeg + edit.rot) * Math.PI / 180;
                            if (exportFlipY) textAngleRad = -textAngleRad;
                            if (exportFlipX) textAngleRad = Math.PI - textAngleRad;
                            ctx.rotate(textAngleRad);
                        }

                        const baseSize = t.h || t.size || 1.8;
                        const fontSize = Math.max(5.5, baseSize * transform.scale * 1.3);
                        
                        if (fontSize >= 5.5) {
                            ctx.font = `bold ${fontSize}px "Segoe UI", Arial, sans-serif`;
                            // Textos de etiquetas en gris neutro oscuro
                            ctx.fillStyle = el.color === 6 ? '#ef4444' : '#404040'; 
                            ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                            ctx.fillText(String(rawTextStr).trim(), 0, 0);
                        }
                        ctx.restore();
                    });
                }

                const isCT = CT_CLASSES.includes(el.class) || CT_CLASSES.includes(Number(el.class));
                if (isCT) {
                    let alreadyDrawn = false;
                    if (el.text && Array.isArray(el.text)) {
                        const labelStr = String(el.ni || el.name || el.id);
                        alreadyDrawn = el.text.some(t => t && String(t.str || t.text || t.val).includes(labelStr));
                    }

                    if (!alreadyDrawn) {
                        const label = el.ni !== undefined ? el.ni : (el.name !== undefined ? el.name : (isCT ? el.id : null));
                        if (label) {
                            ctx.save();
                            ctx.translate(sx, sy);

                            let textAng = angleRad;
                            let deg = (textAng * 180) / Math.PI;
                            deg = ((deg % 360) + 360) % 360;
                            let flipped = false;
                            if (deg > 90 && deg <= 270) {
                                textAng += Math.PI;
                                flipped = true;
                            }

                            ctx.rotate(textAng);
                            ctx.font = `600 ${Math.max(6, 1.8 * transform.scale)}px "Segoe UI", Arial, sans-serif`;
                            ctx.fillStyle = s.isConnected ? '#404040' : '#a3a3a3';
                            ctx.textAlign = 'center'; 
                            ctx.textBaseline = 'middle';
                            
                            const offset = r * 1.4; 
                            ctx.fillText(String(label), 0, flipped ? offset : -offset);
                            ctx.restore();
                        }
                    }
                }
              } catch(err) {
                  console.warn("Fallo menor al renderizar un nodo", el, err);
              }
            };

            // 4. Dibujar todos los nodos base
            data.elements.forEach(el => {
                if (![37, 39, 1122, 1123, 1369, 1113, 1116, 1119, ...CT_CLASSES].includes(el.class)) renderNode(el);
            });

            // 5. Dibujar los Centros de Transformación (CT)
            data.elements.forEach(el => {
                if (CT_CLASSES.includes(el.class)) renderNode(el);
            });

            // 6. Dibujar Pilares, Cajas y Bornes
            data.elements.forEach(el => {
                if ([37, 39, 1122, 1123, 1369, 1113, 1116, 1119].includes(el.class)) renderNode(el);
            });

            if (selectedFeature && isNodeValid(selectedFeature)) {
                renderNode(selectedFeature, true);
            }
            if (pairedFeatureId) {
                const pairedEl = data.elements.find(e => String(e.id) === pairedFeatureId);
                if (pairedEl && isNodeValid(pairedEl)) {
                    renderNode(pairedEl, true);
                }
            }
            
          }, [data, transform, viewMode, connectedIds, showMT, highlightConnected, onlyShowConnected, getElementStyle, getStreetAngleAt, computeCtOrientation, exportFlipX, exportFlipY, manualEdits, selectedFeature, hoveredFeature, pairedFeatureId, streetDictionary, showStreetNames, classDictionary, classDefDictionary, graphicsDictionary, lineDictionary, checkIsCable]);

          useEffect(() => {
            const c = canvasRef.current; if (!c || viewMode !== 'map') return;
            c.addEventListener('wheel', handleWheel, { passive: false });
            return () => c.removeEventListener('wheel', handleWheel);
          }, [viewMode, handleWheel]);

          return (
            <div className="w-full h-screen bg-slate-900 flex flex-col overflow-hidden text-slate-200 font-sans">
              <header className="h-10 bg-slate-800 border-b border-slate-700 flex items-center px-4 justify-between shrink-0">
                <div className="flex items-center gap-4">
                  <div className="flex items-center gap-2">
                      <IconLayers className="text-blue-400 w-4 h-4" />
                      <h1 className="font-bold text-[10px] tracking-tight uppercase">Visor GIS v10.7 (Grayscale)</h1>
                  </div>
                  {data && (
                      <form onSubmit={handleSearch} className="flex items-center">
                          <div className="relative">
                              <IconSearch className="w-3 h-3 absolute left-2 top-1.5 text-slate-400" />
                              <input 
                                  type="text" 
                                  placeholder="Buscar ID o Calle..." 
                                  value={searchQuery}
                                  onChange={(e) => setSearchQuery(e.target.value)}
                                  className="bg-slate-700 text-white text-[9px] font-bold rounded-full pl-6 pr-3 py-1 outline-none focus:ring-1 focus:ring-blue-500 w-40 transition-all placeholder-slate-400"
                              />
                          </div>
                      </form>
                  )}
                </div>
                <div className="flex gap-2">
                  {data && (
                      <button 
                          onClick={() => setIsImportModalOpen(true)} 
                          className="px-3 py-1 bg-amber-600 text-white rounded text-[9px] font-bold hover:bg-amber-500 transition-colors shadow flex items-center gap-1"
                      >
                          <IconPlus className="w-3 h-3" /> Apilar
                      </button>
                  )}
                  <button onClick={() => setShowStreetNames(!showStreetNames)} className={`px-2 py-1 rounded text-[9px] font-bold flex items-center gap-1 transition-colors ${showStreetNames ? 'bg-blue-600 text-white' : 'bg-slate-700 text-slate-300'}`}>{showStreetNames ? <IconEye className="w-3 h-3" /> : <IconEyeOff className="w-3 h-3" />} Calles</button>
                  <button onClick={() => setShowMT(!showMT)} className={`px-2 py-1 rounded text-[9px] font-bold flex items-center gap-1 transition-colors ${showMT ? 'bg-blue-600 text-white' : 'bg-slate-700 text-slate-300'}`}>{showMT ? <IconEye className="w-3 h-3" /> : <IconEyeOff className="w-3 h-3" />} MT</button>
                  <button onClick={() => setViewMode('input')} className="px-3 py-1 bg-slate-700 rounded text-[9px] font-bold hover:bg-slate-600 transition-colors">Datos</button>
                  <button onClick={() => setViewMode('map')} disabled={!data} className="px-3 py-1 bg-blue-600 rounded text-[9px] font-bold hover:bg-blue-500 transition-colors">Mapa</button>
                </div>
              </header>

                {isDraggingFile && (
                    <div className="absolute inset-0 z-[100] bg-blue-500/80 flex items-center justify-center border-4 border-blue-300 border-dashed backdrop-blur-sm pointer-events-none">

                      <button onClick={() => fitToScreenSafe(data, exportFlipX, exportFlipY)} className="w-8 h-8 bg-blue-600 text-white rounded-full shadow-lg flex items-center justify-center hover:bg-blue-700 active:scale-95"><IconMaximize className="w-4 h-4" /></button>

                        {isToolPanelOpen && (
                          <div className="p-3 space-y-3">

                               <label className="flex items-center gap-2 cursor-pointer font-medium"><input type="checkbox" checked={exportFlipY} onChange={e => {setExportFlipY(e.target.checked); if(data) setTimeout(()=>fitToScreenSafe(data, exportFlipX, e.target.checked),0);}} /> Inv. N-S</label>
                               <label className="flex items-center gap-2 cursor-pointer font-medium"><input type="checkbox" checked={exportFlipX} onChange={e => {setExportFlipX(e.target.checked); if(data) setTimeout(()=>fitToScreenSafe(data, e.target.checked, exportFlipY),0);}} /> Inv. E-O</label>
