                                <button onClick={() => { setConnectedIds(new Set()); setOnlyShowConnected(false); setHighlightConnected(true); }} className="w-full py-1 bg-red-50 text-red-600 border border-red-200 rounded text-[9px] font-bold">Limpiar</button>
                              </div>
                            )}
                          </div>
                        )}
                      </div>
                    </div>
                    {selectedFeature && (
                      <div className="absolute right-6 top-6 w-80 max-h-[calc(100vh-3rem)] bg-white shadow-2xl rounded-lg overflow-hidden border border-slate-600 z-50 flex flex-col text-xs">
                        <div className="bg-blue-800 text-white px-4 py-3 flex justify-between items-center shadow-md shrink-0 z-10">
                          <span className="font-bold tracking-tight uppercase truncate" title={getFeatureClassName(selectedFeature)}>
                             {getFeatureClassName(selectedFeature)} (ID: {String(selectedFeature.id || 'N/A')})
                          </span>
                          <button onClick={() => { setSelectedFeature(null); setLinkingMode(null); }} className="hover:bg-red-500 p-1 rounded-full"><IconX className="w-4 h-4" /></button>
                        </div>
                        
                        <div className="flex-1 overflow-y-auto flex flex-col bg-white">
                            <div className="text-slate-900 shrink-0">
                              <table className="w-full border-collapse text-left">
                                <tbody>
                                  {Object.entries(selectedFeature).map(([k, v]) => {
                                    if (['text', 'x', 'y', '_stdCoords', '_autoDx', '_autoDy', '_overlapIdx'].includes(k)) return null;
                                    
                                    let displayKey = k;
                                    if (attrDictionary && attrDictionary[k]) {
                                        displayKey = typeof attrDictionary[k] === 'string' ? attrDictionary[k] : (attrDictionary[k].caption || k);
                                    }

                                    let displayVal = String(v);
                                    if (k === 'area' && areaDictionary && areaDictionary[v]) {
                                        displayVal = `${areaDictionary[v]} (${v})`;
                                    }

                                    return (
                                      <tr key={k} className="border-b border-slate-100 hover:bg-slate-50">
                                        <td className="p-2.5 bg-slate-50 font-bold text-slate-600 w-1/3 text-[10px] capitalize">{displayKey.replace(/_/g, ' ')}</td>
                                        <td className="p-2.5 font-mono text-[10px] text-slate-900 break-all">{displayVal}</td>
                                      </tr>
                                    );
                                  })}
                                </tbody>
                              </table>
                            </div>
                            
                            {([1122, 1123, 1369, 111, 190, 1373].includes(selectedFeature.class)) && (
                                <div className="bg-white p-3 border-t border-slate-300 shrink-0">
                                    <p className="text-[10px] font-bold text-slate-700 uppercase mb-2">Vínculo de Suministro</p>
                                    {currentManualLink ? (
                                        <div className="flex justify-between items-center bg-slate-50 p-2 rounded border border-slate-200">
                                            <span className="text-[10px] font-mono font-bold text-slate-800">
                                                Fijado a ID: {currentManualLink}
                                            </span>
                                            <button 
                                                onClick={() => removeManualLink(String(selectedFeature.id))} 
                                                className="text-red-500 hover:text-red-700 font-bold text-[9px] uppercase tracking-wider"
                                            >
                                                [ Desvincular ]
                                            </button>
                                        </div>
                                    ) : (
                                        <button 
                                            onClick={() => {
                                                if (linkingMode && linkingMode.id === selectedFeature.id) {
                                                    setLinkingMode(null);
                                                } else {
                                                    setLinkingMode({ 
                                                        id: selectedFeature.id, 
                                                        type: [111, 190, 1373].includes(selectedFeature.class) ? 'supply' : 'pillar' 
                                                    });
                                                }
                                            }}
                                            className={`w-full py-1.5 rounded text-[9px] font-bold uppercase transition-colors shadow-sm ${linkingMode && linkingMode.id === selectedFeature.id ? 'bg-amber-500 text-white animate-pulse' : 'bg-slate-200 text-slate-700 hover:bg-slate-300'}`}
                                        >
                                            {linkingMode && linkingMode.id === selectedFeature.id ? 'Selecciona destino en el mapa...' : 'Vincular Manualmente'}
                                        </button>
                                    )}
                                </div>
                            )}

                            {isTraceable && (
                                <div className="bg-slate-100 p-3 border-t border-slate-300 shrink-0">
                                    <div className="flex justify-between items-center mb-2">
                                        <p className="text-[10px] font-bold text-slate-700 uppercase flex items-center gap-1">
                                            <IconZap className="w-3 h-3 text-blue-600" /> Trazabilidad de Red
                                        </p>
                                        {connectedIds.size > 0 && (
                                            <button 
                                                onClick={() => { setConnectedIds(new Set()); setHighlightConnected(false); }} 
                                                className="text-[9px] font-bold text-red-600 hover:text-red-800 transition-colors"
                                            >
                                                [ Limpiar ]
                                            </button>
                                        )}
                                    </div>
                                    <div className="flex flex-col gap-1.5">
                                        <button 
                                            onClick={() => handleTrace('continuity')} 
                                            className="w-full bg-blue-600 text-white font-bold py-1.5 rounded text-[9px] hover:bg-blue-700 transition-colors shadow-sm"
                                        >
                                            Continuidad del Tramo
                                        </button>
                                        {!checkIsCable(selectedFeature) && (
                                            <div className="flex gap-1.5 w-full">
                                                <button 
                                                    onClick={() => handleTrace('upstream')} 
                                                    className="flex-1 bg-amber-600 text-white font-bold py-1.5 rounded text-[9px] hover:bg-amber-700 transition-colors shadow-sm"
                                                >
                                                    Aguas Arriba
                                                </button>
                                                <button 
                                                    onClick={() => handleTrace('downstream')} 
                                                    className="flex-1 bg-slate-700 text-white font-bold py-1.5 rounded text-[9px] hover:bg-slate-800 transition-colors shadow-sm"
                                                >
                                                    Aguas Abajo (Al CT)
                                                </button>
                                            </div>
                                        )}
                                    </div>
                                </div>
                            )}

                            {!checkIsCable(selectedFeature) && (
                              <div className="bg-white p-3 border-t border-slate-300 shrink-0">
                                <p className="text-[10px] font-bold text-slate-700 uppercase mb-2">Ajuste Manual</p>
                                <div className="flex gap-2 mb-2">
                                  <label className="flex-1 text-[9px] font-bold text-slate-600">Desfase X
                                    <input type="number" step="0.5" value={manualEdits[selectedFeature.id]?.dx || 0} onChange={e => handleManualEdit(selectedFeature.id, 'dx', e.target.value)} className="w-full mt-1 p-1 border rounded text-slate-800 font-mono" />
                                  </label>
                                  <label className="flex-1 text-[9px] font-bold text-slate-600">Desfase Y
                                    <input type="number" step="0.5" value={manualEdits[selectedFeature.id]?.dy || 0} onChange={e => handleManualEdit(selectedFeature.id, 'dy', e.target.value)} className="w-full mt-1 p-1 border rounded text-slate-800 font-mono" />
                                  </label>
                                </div>
                                <label className="block text-[9px] font-bold text-slate-600 mb-2">Rotación ({Math.round(manualEdits[selectedFeature.id]?.rot || 0)}°)
                                  <input type="range" min="-180" max="180" step="1" value={manualEdits[selectedFeature.id]?.rot || 0} onChange={e => handleManualEdit(selectedFeature.id, 'rot', e.target.value)} className="w-full mt-1 accent-blue-600" />
                                </label>
                              </div>
                            )}
                        </div>
                        <div className="bg-slate-50 px-4 py-2 border-t border-slate-300 text-[9px] text-slate-500 font-bold text-center uppercase tracking-widest shrink-0">Información Técnica</div>
                      </div>
                    )}
                  </>
                ) : (
                  <div className="absolute inset-0 bg-slate-100 p-6 flex flex-col text-slate-800 overflow-y-auto">
                    <div className="max-w-3xl mx-auto w-full bg-white rounded shadow p-6 border border-slate-200">
                      
                      {message && (
                          <div className={`mb-4 px-3 py-2 rounded text-xs font-bold ${message.type === 'error' ? 'bg-red-100 text-red-700 border border-red-200' : 'bg-green-100 text-green-800 border border-green-200'}`}>
                              {message.text}
                          </div>
                      )}

                      <div className="mb-6">
                          <h2 className="font-bold mb-2 flex items-center gap-2 text-sm text-blue-800 uppercase">
                              <IconLayers className="w-4 h-4"/> 1. Datos del Mapa Espacial
                          </h2>
                          <p className="text-[10px] text-slate-500 mb-2">Pega aquí el código que extraes del panel de Red.</p>
                          <textarea className="w-full h-48 p-4 font-mono text-[10px] bg-slate-50 border border-slate-300 rounded outline-none resize-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500" placeholder="Pega aquí los datos..." value={rawData} onChange={e => setRawData(e.target.value)} />
                          <div className="mt-2 flex gap-2">
                            <button onClick={() => processData(false)} className="bg-blue-600 text-white font-bold py-2 px-4 rounded text-xs hover:bg-blue-700 shadow">Cargar Mapa Nuevo</button>
                            <button onClick={() => fileInputRef.current?.click()} className="bg-slate-700 text-white font-bold py-2 px-4 rounded text-xs hover:bg-slate-800 shadow flex items-center gap-1 transition-colors"><IconFileText className="w-4 h-4" /> Subir Archivo(s)</button>
                          </div>
                      </div>

                      <div className="border-t border-slate-200 pt-6">
                          <h2 className="font-bold mb-2 flex items-center gap-2 text-sm text-amber-700 uppercase">
                              <IconFileText className="w-4 h-4"/> 2. Diccionarios del Sistema (Opcional)
                          </h2>
                          <p className="text-[10px] text-slate-500 mb-2">Pega aquí los archivos <strong>areas.js, colors.js, metamodel.js</strong> o <strong>graphics1.js</strong> para cargar su contenido real.</p>
                          <textarea className="w-full h-24 p-3 font-mono text-[10px] bg-amber-50 border border-amber-200 rounded outline-none resize-none focus:border-amber-500 focus:ring-1 focus:ring-amber-500" placeholder='Ejemplo: GRAPHICS = { ... }' value={dictRawData} onChange={e => setDictRawData(e.target.value)} />
                          <div className="mt-2 flex items-center gap-3 flex-wrap">
                            <button onClick={() => processDictionaryData(dictRawData)} className="bg-amber-600 text-white font-bold py-2 px-4 rounded text-xs hover:bg-amber-700 shadow transition-colors">Aprender Diccionario</button>
                            
                            <input 
                                type="file" 
                                multiple 
                                accept=".js,.txt,.json" 
                                className="hidden" 
                                ref={fileInputRef} 
                                onChange={handleFileUpload} 
                            />
                            <button 
                                onClick={() => fileInputRef.current?.click()} 
                                className="bg-slate-700 text-white font-bold py-2 px-4 rounded text-xs hover:bg-slate-800 shadow transition-colors flex items-center gap-2"
                            >
                                <IconPlus className="w-4 h-4" /> Cargar Archivos (.js, .txt)
                            </button>

                            {Object.keys(streetDictionary).length > 0 && (
                                <span className="py-1 px-3 text-[10px] font-bold text-green-700 bg-green-100 border border-green-200 rounded-full animate-pulse">✓ {Object.keys(streetDictionary).length} Calles</span>
                            )}
                            {Object.keys(classDictionary).length > Object.keys(DEFAULT_CLASSES).length && (
                                <span className="py-1 px-3 text-[10px] font-bold text-green-700 bg-green-100 border border-green-200 rounded-full animate-pulse">✓ {Object.keys(classDictionary).length} Clases</span>
                            )}
                            {Object.keys(areaDictionary).length > 0 && (
                                <span className="py-1 px-3 text-[10px] font-bold text-green-700 bg-green-100 border border-green-200 rounded-full animate-pulse">✓ {Object.keys(areaDictionary).length} Áreas</span>
                            )}
                            {Object.keys(graphicsDictionary).length > Object.keys(HARDCODED_GRAPHICS).length && (
                                <span className="py-1 px-3 text-[10px] font-bold text-green-700 bg-green-100 border border-green-200 rounded-full animate-pulse">✓ {Object.keys(graphicsDictionary).length} Gráficos</span>
                            )}
                            {Object.keys(attrDictionary).length > Object.keys(HARDCODED_ATTRS).length && (
                                <span className="py-1 px-3 text-[10px] font-bold text-green-700 bg-green-100 border border-green-200 rounded-full animate-pulse">✓ {Object.keys(attrDictionary).length} Atributos</span>
                            )}
                          </div>
                      </div>

                    </div>
                  </div>
                )}
              </main>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
