<!DOCTYPE html>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visor GIS Profesional</title>
    
    <!-- Librerías de React y Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

<body class="bg-slate-900 text-slate-200 font-sans overflow-hidden">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useRef, useEffect, useCallback, useMemo } = React;

        // --- Íconos SVG Inline ---
        const IconLayers = ({ className }) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 12 12 17 22 12"/><polyline points="2 17 12 22 22 17"/></svg>;
        const IconMaximize = ({ className }) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/></svg>;
        const IconEye = ({ className }) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>;
        const IconEyeOff = ({ className }) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>;
        const IconFileText = ({ className }) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>;
        const IconX = ({ className }) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>;
        const IconZap = ({ className }) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>;
        const IconPlus = ({ className }) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>;
        const IconSearch = ({ className }) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>;

        // --- Constantes Técnicas ---
        const isValidNum = (n) => typeof n === 'number' && !isNaN(n) && isFinite(n);
        const isNodeValid = (el) => el && isValidNum(el.x) && isValidNum(el.y);

        const getRenderX = (x, flipX) => flipX ? -x : x;
        const getRenderY = (y, flipY) => flipY ? y : -y;

        const CT_CLASSES = [1186, 1170, 1232, 1183, 1179, 1461];
        const SUPPLY_CLASSES = [111, 190, 1373];
        const NETWORK_CLASSES = [1089, 1091, 1093, 1094, 1095, 1096, 1097, 1099, 'Puente'];
        const POLE_CLASSES = [15, 39, 56, 64, 65, 74, 75, 81, 98, 228, 408, 422, 1122, 1123, 1369]; 
        
        const MT_LINE_CLASSES = [1089, 1091];
        const MT_POLE_CLASSES = [52, 408, 422, 1119];

        // --- DICCIONARIOS NATIVOS INTEGRADOS ---
        const DEFAULT_CLASSES = {
            "-3": "Eje Vial / Sección de Calle",
            "-2": "Vereda",
            "1": "Manzana",
            "15": "Poste de Madera / H°A°",
            "39": "Caja de Distribución",
            "52": "Puente BT/MT",
            "56": "Caja APR / Fusible",
            "64": "Poste de Madera",
            "65": "Poste de H°A°",
            "74": "Poste Suspensión",
            "75": "Rienda",
            "81": "Poste Retención",
            "98": "Poste Genérico",
            "111": "Suministro (Medidor)",
            "190": "Suministro",
            "228": "Poste Doble Perpendicular",
            "408": "Poste MT",
            "422": "Poste MT H°A°",
            "1088": "Cable Subterráneo XLPE",
            "1089": "Línea MT 13.2kV",
            "1091": "Cable Subterráneo MT",
            "1093": "Línea BT Abierta",
            "1094": "Línea BT Preensamblada",
            "1095": "Línea BT Concéntrica",
            "1096": "Línea BT Sin Datos",
            "1097": "Puente BT",
            "1113": "Borne / Nodo de Conexión",
            "1122": "Pilar Individual",
            "1123": "Pilar Múltiple / Carenciado",
            "1170": "Centro de Transformación (CT)",
            "1179": "Centro de Transformación (CT)",
            "1183": "Centro de Transformación (CT)",
            "1186": "Centro de Transformación (CT)",
            "1219": "Línea Medianera",
            "1232": "Centro de Transformación (CT)",
            "1369": "Pilar Doble",
            "1373": "Suministro Potencial",
            "1461": "Transformador"
        };

        const HARDCODED_GRAPHICS = {
            56: { 
                scale: 0.9,
                gs: [
                    { type: 5, attr: { 'stroke-width': 0.25, fill: '#ffffff', stroke: '#000000', d: 'M-1.8,-2.6 L1.8,-2.6 L1.8,2.6 L-1.8,2.6 Z' } },
                    { type: 5, attr: { 'stroke-width': 0.4, fill: 'none', stroke: '#000000', d: 'M-0.8,-1.2 C1.8,-1.2 -1.8,1.2 0.8,1.2' } }
                ]
            },
            2: { 
                scale: 0.8,
                gs: [
                    { type: 1, attr: { 'stroke-width': 0.2, stroke: '#272828', x1: 0.0, y1: -0.55, x2: -3.5, y2: -0.55 } },
                    { type: 1, attr: { 'stroke-width': 0.2, stroke: '#272828', x1: 0.0, y1: 0.55, x2: -3.5, y2: 0.55 } },
                    { type: 5, attr: { 'stroke-width': 0.2, stroke: '#272828', d: 'M-3.5,1.05 L-3.5,0 L-3.5,-1.05 L0,-1.05 L0,1.05z', fill: '#272828', 'fill-opacity': 0.1 } }
                ]
            }
        };

        const HARDCODED_ATTRS = {
            "242": { caption: "Calibre Fusible" },
            "243": { caption: "Periodo reportes repo. inter." },
            "244": { caption: "Periodo repo. inter. mensual" },
            "139": { caption: "MT MD Entradas" },
            "140": { caption: "MT Simbolos Varios" },
            "141": { caption: "MT Nodos" },
            "alt": { caption: "Altura / Cota" }
        };

        const HARDCODED_COLORS = {
            '0.4': "#3c61c1",
            '13.2': "#4CAF50",
            '21': "#00ffff",
            '27': "#4CAF50",
            '33': "#dd4be5",
            '66': "#673ab7",
            '132': "#ff5722",
            '220': "#2196F3",
            '500': "#f44336"
        };

        const HARDCODED_LINES = {
            'cusmt': [6, 3],
            'casbt': [1, 1],
            'lamt': [],
            'lapt': []
        };

        function App() {
          const canvasRef = useRef(null);
          const [rawData, setRawData] = useState('');
          const [data, setData] = useState(null);
          const [connectedIds, setConnectedIds] = useState(new Set());
          const [message, setMessage] = useState(null); 
          const [selectedFeature, setSelectedFeature] = useState(null);
          const [isToolPanelOpen, setIsToolPanelOpen] = useState(true);
          const [viewMode, setViewMode] = useState('input');
          const [transform, setTransform] = useState({ x: 0, y: 0, scale: 1 });
          const [isDragging, setIsDragging] = useState(false);
          const [dragStart, setDragStart] = useState({ x: 0, y: 0 });
          const [exportFlipY, setExportFlipY] = useState(true);
          const [exportFlipX, setExportFlipX] = useState(false);
          const [showMT, setShowMT] = useState(false);
          const [showStreetNames, setShowStreetNames] = useState(false);
          const [highlightConnected, setHighlightConnected] = useState(true);
          const [onlyShowConnected, setOnlyShowConnected] = useState(false);
          const [manualEdits, setManualEdits] = useState({});
          const [draggingFeature, setDraggingFeature] = useState(null);
          const [featureDragInfo, setFeatureDragInfo] = useState(null);
          const [hoveredFeature, setHoveredFeature] = useState(null);
          const [isImportModalOpen, setIsImportModalOpen] = useState(false);
          const [importText, setImportText] = useState('');
          const [isDraggingFile, setIsDraggingFile] = useState(false);
          const [manualSupplyLinks, setManualSupplyLinks] = useState({});
          const [linkingMode, setLinkingMode] = useState(null);
          const [searchQuery, setSearchQuery] = useState('');

          const [streetDictionary, setStreetDictionary] = useState({});
          const [classDictionary, setClassDictionary] = useState(DEFAULT_CLASSES);
          const [areaDictionary, setAreaDictionary] = useState({});
          const [graphicsDictionary, setGraphicsDictionary] = useState(HARDCODED_GRAPHICS);
          const [attrDictionary, setAttrDictionary] = useState(HARDCODED_ATTRS);
          const [colorDictionary, setColorDictionary] = useState(HARDCODED_COLORS);
          const [lineDictionary, setLineDictionary] = useState(HARDCODED_LINES);
          
          const [dictRawData, setDictRawData] = useState('');

          const handleManualEdit = useCallback((id, field, value) => {
            setManualEdits(prev => ({
              ...prev,
              [id]: { ...(prev[id] || { dx: 0, dy: 0, rot: 0 }), [field]: parseFloat(value) || 0 }
            }));
          }, []);

          const removeManualLink = useCallback((fid) => {
              setManualSupplyLinks(prev => {
                  const next = { ...prev };
                  if (next[fid]) delete next[fid];
                  const keysToRemove = Object.keys(next).filter(k => next[k] === fid);
                  keysToRemove.forEach(k => delete next[k]);
                  return next;
              });
          }, []);

          const currentManualLink = useMemo(() => {
              if (!selectedFeature) return null;
              const fid = String(selectedFeature.id);
              if ([111, 190, 1373].includes(selectedFeature.class)) return manualSupplyLinks[fid] || null;
              else if ([1122, 1123, 1369].includes(selectedFeature.class)) return Object.keys(manualSupplyLinks).find(k => String(manualSupplyLinks[k]) === fid) || null;
              return null;
          }, [selectedFeature, manualSupplyLinks]);

          const handleSearch = useCallback((e) => {
              e.preventDefault();
              if (!data || !searchQuery) return;
              
              const q = searchQuery.toLowerCase().trim();
              setMessage(null);

              let found = data.elements.find(el => {
                  if (String(el.id).toLowerCase() === q) return true;
                  if (el.ni && String(el.ni).toLowerCase() === q) return true;
                  if (el.class === -2 || el.class === -3) {
                      const sName = streetDictionary[el.street || el.st];
                      if (sName && sName.toLowerCase().includes(q)) return true;
                  }
                  return false;
              });

              if (found) {
                  setSelectedFeature(found);
                  let cx = 0, cy = 0;
                  
                  if (found._stdCoords && found._stdCoords.length >= 2) {
                      let sx = 0, sy = 0;
                      const pts = found._stdCoords.length / 2;
                      for(let i=0; i < found._stdCoords.length; i+=2) {
                          sx += found._stdCoords[i];
                          sy += found._stdCoords[i+1];
                      }
                      cx = sx / pts; cy = sy / pts;
                  } else if (isValidNum(found.x)) {
                      cx = found.x; cy = found.y;
                  }

                  if (cx && cy) {
                      const w = canvasRef.current.clientWidth;
                      const h = canvasRef.current.clientHeight;
                      const targetScale = 18; 
                      const rx = getRenderX(cx, exportFlipX);
                      const ry = getRenderY(cy, exportFlipY);
                      
                      setTransform({
                          scale: targetScale,
                          x: w/2 - (rx * targetScale),
                          y: h/2 - (ry * targetScale)
                      });
                      setViewMode('map');
                      setSearchQuery('');
                  }
              } else {
                  setMessage({ text: `No se encontró ningún elemento o calle con el texto "${searchQuery}".`, type: 'error' });
              }
          }, [data, searchQuery, streetDictionary, exportFlipX, exportFlipY]);

          const networkEnds = useMemo(() => {
            if (!data) return [];
            const ends = [];
            const pointMap = {};
            const keyF = (nx, ny) => `${Math.round(nx)},${Math.round(ny)}`;
            data.elements.forEach(o => {
              if (!showMT && MT_LINE_CLASSES.includes(o.class)) return; 
              if (o._stdCoords && NETWORK_CLASSES.includes(o.class)) {
                for(let i=0; i<o._stdCoords.length; i+=2) pointMap[keyF(o._stdCoords[i], o._stdCoords[i+1])] = (pointMap[keyF(o._stdCoords[i], o._stdCoords[i+1])] || 0) + 1;
              }
            });
            data.elements.forEach(o => {
              if (!showMT && MT_LINE_CLASSES.includes(o.class)) return; 
              if (o._stdCoords && NETWORK_CLASSES.includes(o.class) && o._stdCoords.length >= 4) {
                const c = o._stdCoords, last = c.length - 2;
                ends.push({ x: c[0], y: c[1], prevX: c[2], prevY: c[3], degree: pointMap[keyF(c[0], c[1])], id: o.id });
                ends.push({ x: c[last], y: c[last+1], prevX: c[last-2], prevY: c[last-1], degree: pointMap[keyF(c[last], c[last+1])], id: o.id });
              }
            });
            return ends;
          }, [data, showMT]);

          const getNearestCableEnd = useCallback((x, y, usedSet = null) => {
            if (!networkEnds || networkEnds.length === 0) return null;
            let nearest = null, bestDist = 10.0; 
            const isUsed = (e) => usedSet && usedSet.has(e.id + '_' + e.x + '_' + e.y);
            networkEnds.filter(e => e.degree === 1 && !isUsed(e)).forEach(e => {
                const d = Math.hypot(x - e.x, y - e.y);
                if (d < bestDist) { bestDist = d; nearest = e; }
            });
            if (!nearest) {
                bestDist = 5.0; 
                networkEnds.filter(e => e.degree > 1 && !isUsed(e)).forEach(e => {
                    const d = Math.hypot(x - e.x, y - e.y);
                    if (d < bestDist) { bestDist = d; nearest = e; }
                });
            }
            return nearest;
          }, [networkEnds]);

          const pillarSnaps = useMemo(() => {
              if (!data) return {};
              const snaps = {}, used = new Set();
              data.elements.forEach(el => {
                  if ([1122, 1123, 1369].includes(el.class)) {
                      const edit = manualEdits[el.id] || { dx: 0, dy: 0, rot: 0 };
                      const fx = el.x + (el._autoDx || 0) + edit.dx;
                      const fy = el.y + (el._autoDy || 0) + edit.dy;
                      const snap = getNearestCableEnd(fx, fy, used);
                      if (snap) { snaps[el.id] = snap; used.add(snap.id + '_' + snap.x + '_' + snap.y); }
                  }
              });
              return snaps;
          }, [data, getNearestCableEnd, manualEdits]);

          const adjMap = useMemo(() => {
            if (!data) return {};
            const adj = {}, initAdj = (id) => { if (!adj[id]) adj[id] = new Set(); };
            data.elements.forEach(el => initAdj(String(el.id)));
            data.elements.forEach(el => {
                if (el.class === 1113 && el.master != null) {
                    const eid = String(el.id), mid = String(el.master);
                    initAdj(eid); initAdj(mid); adj[eid].add(mid); adj[mid].add(eid);
                }
            });
            const connectionPoints = [];
            data.elements.forEach(el => {
                const eid = String(el.id);
                if (el._stdCoords && NETWORK_CLASSES.includes(el.class) && el._stdCoords.length >= 4) {
                    connectionPoints.push({ id: eid, x: el._stdCoords[0], y: el._stdCoords[1] }); 
                    connectionPoints.push({ id: eid, x: el._stdCoords[el._stdCoords.length - 2], y: el._stdCoords[el._stdCoords.length-1] }); 
                } else if (isNodeValid(el)) {
                    let px = el.x, py = el.y;
                    if (pillarSnaps[eid]) { px = pillarSnaps[eid].x; py = pillarSnaps[eid].y; }
                    connectionPoints.push({ id: eid, x: px, y: py });
                }
            });
            const TOLERANCE_SQ = 1.0, CELL = 10, grid = {};
            connectionPoints.forEach(p => {
                const key = `${Math.round(p.x / CELL)},${Math.round(p.y / CELL)}`;
                if (!grid[key]) grid[key] = []; grid[key].push(p);
            });
            connectionPoints.forEach(p1 => {
                const gx = Math.round(p1.x / CELL), gy = Math.round(p1.y / CELL);
                for (let dx = -1; dx <= 1; dx++) {
                    for (let dy = -1; dy <= 1; dy++) {
                        const key = `${gx+dx},${gy+dy}`;
                        if (grid[key]) grid[key].forEach(p2 => {
                            if (p1.id !== p2.id && ((p1.x - p2.x)**2 + (p1.y - p2.y)**2 <= TOLERANCE_SQ)) {
                                adj[p1.id].add(p2.id); adj[p2.id].add(p1.id);
                            }
                        });
                    }
                }
            });
            return adj;
          }, [data, pillarSnaps]);

          const getStreetAngleAt = useCallback((x, y) => {
            if (!data) return 0;
            let streetAngle = 0, minStreetDist = Infinity;
            data.elements.forEach(o => {
              if (o._stdCoords && [-3, -2, 1].includes(o.class)) {
                for (let i = 0; i < o._stdCoords.length - 3; i += 2) {
                  const x0 = o._stdCoords[i], y0 = o._stdCoords[i+1], x1 = o._stdCoords[i+2], y1 = o._stdCoords[i+3];
                  const dx = x1 - x0, dy = y1 - y0, lenSq = dx*dx + dy*dy;
                  if (lenSq < 1e-6) continue;
                  const t = Math.max(0, Math.min(1, ((x - x0) * dx + (y - y0) * dy) / lenSq));
                  const d = Math.hypot(x - (x0 + t * dx), y - (y0 + t * dy));
                  if (d < minStreetDist) { minStreetDist = d; streetAngle = Math.atan2(exportFlipY ? dy : -dy, exportFlipX ? -dx : dx) * 180 / Math.PI; }
                }
              }
            });
            return streetAngle;
          }, [data, exportFlipY, exportFlipX]);

          const pairedFeatureId = useMemo(() => {
              if (!data || !selectedFeature) return null;
              const fid = String(selectedFeature.id);
              if ([111, 190, 1373].includes(selectedFeature.class) && manualSupplyLinks[fid]) return manualSupplyLinks[fid];
              if ([1122, 1123, 1369].includes(selectedFeature.class)) {
                  const sId = Object.keys(manualSupplyLinks).find(k => String(manualSupplyLinks[k]) === fid);
                  if (sId) return sId;
              }
              if (![1122, 1123, 1369, 111, 190].includes(selectedFeature.class)) return null;

              let seedPillar = null;
              if ([1122, 1123, 1369].includes(selectedFeature.class)) seedPillar = selectedFeature;
              else {
                  let minDist = Infinity;
                  data.elements.forEach(e => {
                      if ([1122, 1123, 1369].includes(e.class)) {
                          const d = Math.hypot(e.x - selectedFeature.x, e.y - selectedFeature.y);
                          if (d < 30 && d < minDist) { minDist = d; seedPillar = e; }
                      }
                  });
              }

              if (seedPillar) {
                  const clusterP = new Set([String(seedPillar.id)]);
                  let added = true;
                  while (added) {
                      added = false;
                      data.elements.forEach(e => {
                          if ([1122, 1123, 1369].includes(e.class) && !clusterP.has(String(e.id))) {
                              const isNear = Array.from(clusterP).some(pid => {
                                  const p = data.elements.find(x => String(x.id) === String(pid));
                                  return p && Math.hypot(e.x - p.x, e.y - p.y) < 4.0;
                              });
                              if (isNear) { clusterP.add(String(e.id)); added = true; }
                          }
                      });
                  }
                  
                  const allClusterPillars = Array.from(clusterP).map(id => data.elements.find(e => String(e.id) === String(id)));
                  const clusterPillars = allClusterPillars.filter(p => {
                      if (!p || typeof p !== 'object' || p.cc == null) return false;
                      const ccStr = String(p.cc).trim().toLowerCase();
                      return ccStr !== '' && ccStr !== '0' && ccStr !== 'no';
                  });
                  const N = clusterPillars.length;

                  if (N > 0) {
                      let allSupplies = data.elements.filter(e => e.class === 111 || e.class === 190);
                      allSupplies = allSupplies.filter(s => {
                          const linkedPillarId = manualSupplyLinks[String(s.id)];
                          if (!linkedPillarId) return true; 
                          return clusterP.has(String(linkedPillarId)); 
                      });
                      allSupplies.sort((a, b) => {
                          const distA = Math.min(...clusterPillars.map(p => Math.hypot(a.x - p.x, a.y - p.y)));
                          const distB = Math.min(...clusterPillars.map(p => Math.hypot(b.x - p.x, b.y - p.y)));
                          return distA - distB;
                      });
                      const clusterSupplies = allSupplies.slice(0, N);
                      if (clusterPillars.length > 0 && clusterSupplies.length > 0) {
                          let dx = Math.max(...clusterPillars.map(p => p.x)) - Math.min(...clusterPillars.map(p => p.x));
                          let dy = Math.max(...clusterPillars.map(p => p.y)) - Math.min(...clusterPillars.map(p => p.y));
                          if (dx < 0.1 && dy < 0.1 && clusterSupplies.length > 1) {
                              dx = Math.max(...clusterSupplies.map(s => s.x)) - Math.min(...clusterSupplies.map(s => s.x));
                              dy = Math.max(...clusterSupplies.map(s => s.y)) - Math.min(...clusterSupplies.map(s => s.y));
                          }
                          const useX = dx > dy;
                          const sortFn = (a, b) => {
                              if (useX) {
                                  if (Math.abs(a.x - b.x) > 0.1) return a.x - b.x;
                                  if (Math.abs(a.y - b.y) > 0.1) return a.y - b.y;
                                  return String(a.id).localeCompare(String(b.id));
                              } else {
                                  if (Math.abs(a.y - b.y) > 0.1) return a.y - b.y;
                                  if (Math.abs(a.x - b.x) > 0.1) return a.x - b.x;
                                  return String(a.id).localeCompare(String(b.id));
                              }
                          };
                          clusterPillars.sort(sortFn); clusterSupplies.sort(sortFn);

              if (foundGraphics > 0) msgParts.push(`${foundGraphics} gráficos`);
              if (foundAttrs > 0) msgParts.push(`${foundAttrs} atributos`);
              if (foundColors > 0) msgParts.push(`${foundColors} colores`);
              if (foundLines > 0) msgParts.push(`${foundLines} tipos de línea`);
              
              if (msgParts.length > 0) {
                  setDictRawData('');
                  setMessage({ text: `¡Diccionarios cargados! El visor aprendió: ${msgParts.join(', ')}.`, type: 'success' });
              } else {
                  setMessage({ text: 'No se encontraron diccionarios reconocidos en el texto.', type: 'error' });
              }
          }, [streetDictionary, classDictionary, areaDictionary, graphicsDictionary, attrDictionary]);

          const handleDrop = useCallback((e) => {
            e.preventDefault(); setIsDraggingFile(false);
            const files = Array.from(e.dataTransfer.files || []);
            if (files.length > 0) {
                files.forEach(file => {
                    const reader = new FileReader();
                    reader.onload = (ev) => {
                        const text = ev.target.result;
                        if (file.name.toLowerCase().match(/(street|area|class|meta|graphic|color|line|model|symbol)/)) {
                            processDictionaryData(text); setViewMode('input');
                        } else {
                            processData(true, text);
                        }
                    };
                    reader.readAsText(file);
                });
            }
          }, [processDictionaryData, processData]);

          const processData = useCallback((isAppend = false, customText = null) => {
            setMessage(null);
            try {
              let text = (customText !== null ? customText : rawData).trim(); 
              if (!text) return;
              
              // Buscamos dinamicamente si el texto contiene diccionarios.
              if (text.includes("STREETS={") || text.includes("GRAPHICS = {") || text.includes("CLASSES={") || text.includes("ATTRDEFS") || text.includes("CROMO_COLORS")) {
                  processDictionaryData(text);
              }

              const blocks = []; let depth = 0, start = -1;
              for (let i = 0; i < text.length; i++) {
                if (text[i] === '{') { if (depth === 0) start = i; depth++; } 
                else if (text[i] === '}') { if (depth > 0) { depth--; if (depth === 0) blocks.push(text.substring(start, i + 1)); } }
              }
              const localScale = parseFloat((text.match(/scale\s*[:=]\s*([-\d.]+)/) || [0, data?.geo?.scale || 0])[1]);
              const localX1 = parseFloat((text.match(/x1\s*[:=]\s*([-\d.]+)/) || (text.match(/xmin\s*[:=]\s*([-\d.]+)/)) || [0, data?.geo?.x1 || 0])[1]);
              const localY2 = parseFloat((text.match(/y2\s*[:=]\s*([-\d.]+)/) || (text.match(/ymax\s*[:=]\s*([-\d.]+)/)) || [0, data?.geo?.y2 || 0])[1]);
              
              const absX = (v) => (!localScale) ? v : localX1 + (v / localScale);
              const absY = (v) => (!localScale) ? v : localY2 - (v / localScale);
              
              let newElements = [];
              blocks.forEach(block => {
                let el = {}; try { el = new Function('return (' + block + ')')() || {}; } catch (e) { return; }
                const ext = (r) => { let m = block.match(r); return m ? m[1].split(/[\s,]+/).map(n => parseFloat(n)).filter(isValidNum) : null; };
                let coords = ext(/\bc\s*:\s*\[([\s\d.,-]+)\]/) || ext(/\bpoints\s*:\s*['"]([\s\d.,-]+)['"]/) || ext(/\bp\s*:\s*\[([\s\d.,-]+)\]/);
                if (coords && coords.length >= 2) { if (coords.length === 2) { el.x = coords[0]; el.y = coords[1]; } else el._stdCoords = coords; }
                if (el.x !== undefined) { el.x = absX(el.x); el.y = absY(el.y); }
                if (el._stdCoords) { for (let i = 0; i < el._stdCoords.length - 1; i += 2) { el._stdCoords[i] = absX(el._stdCoords[i]); el._stdCoords[i+1] = absY(el._stdCoords[i+1]); } }
                if (el.text) el.text.forEach(t => { if (isValidNum(t.x)) t.x = absX(t.x); if (isValidNum(t.y)) t.y = absY(t.y); });
                if (el.from && isValidNum(el.from.x)) { el.from.x = absX(el.from.x); el.from.y = absY(el.from.y); }
                if (el.to && isValidNum(el.to.x)) { el.to.x = absX(el.to.x); el.to.y = absY(el.to.y); }
                if (el.x !== undefined || el._stdCoords) newElements.push(el);
              });

              let combined = [];
              if (isAppend && data) {
                  let offsetX = 0, offsetY = 0, isAligned = false;
                  for (let newEl of newElements) {
                      if (newEl.id != null) {
                          const oldEl = data.elements.find(e => String(e.id) === String(newEl.id));
                          if (oldEl && isValidNum(oldEl.x) && isValidNum(newEl.x)) {
                              offsetX = oldEl.x - newEl.x; offsetY = oldEl.y - newEl.y; isAligned = true; break;
                          }
                      }
                  }

                  if (isAligned && (Math.abs(offsetX) > 0.001 || Math.abs(offsetY) > 0.001)) {
                      newElements.forEach(el => {
                          if (el.x !== undefined) { el.x += offsetX; el.y += offsetY; }
                          if (el._stdCoords) for (let i = 0; i < el._stdCoords.length; i += 2) { el._stdCoords[i] += offsetX; el._stdCoords[i+1] += offsetY; }
                          if (el.text) el.text.forEach(t => { if (isValidNum(t.x)) t.x += offsetX; if (isValidNum(t.y)) t.y += offsetY; });
                          if (el.from && isValidNum(el.from.x)) { el.from.x += offsetX; el.from.y += offsetY; }
                          if (el.to && isValidNum(el.to.x)) { el.to.x += offsetX; el.to.y += offsetY; }
                      });
                  }
              }

              const uniqueMap = new Map();
              const getGeomHash = (e) => {
                  if (e.id != null && e.id !== "") return String(e.id);
                  if (e._stdCoords && e._stdCoords.length >= 4) {
                      const mid = Math.floor(e._stdCoords.length / 4) * 2;
                      return `g_${e.class}_${Math.round(e._stdCoords[0])}_${Math.round(e._stdCoords[1])}_${Math.round(e._stdCoords[mid])}_${Math.round(e._stdCoords[e._stdCoords.length-2])}`;
                  }
                  if (isValidNum(e.x)) return `g_${e.class}_${Math.round(e.x)}_${Math.round(e.y)}`;
                  return null;
              };

              if (isAppend && data) {
                  data.elements.forEach(el => {
                      const h = getGeomHash(el);
                      if (h) uniqueMap.set(h, el);
                      else combined.push(el);
                  });
              }

              newElements.forEach(el => {
                  const h = getGeomHash(el);
                  if (h) uniqueMap.set(h, el);
                  else combined.push(el);
              });
              combined = [...combined, ...Array.from(uniqueMap.values())];
              
              const pillarMap = {};
              combined.forEach(el => {
                  if (isNodeValid(el) && [39, 1122, 1123, 1369].includes(el.class)) { 
                      const key = `${Math.round(el.x)},${Math.round(el.y)}`;
                      if (!pillarMap[key]) pillarMap[key] = []; pillarMap[key].push(el);
                  }
              });
              Object.values(pillarMap).forEach(arr => { if (arr.length > 1) arr.forEach((el, idx) => { el._overlapIdx = idx; }); });
              
              const processed = { geo: { scale: localScale, x1: localX1, y2: localY2 }, elements: combined, bounds: { minX: 0, maxX: 0, minY: 0, maxY: 0 } };
              setData(processed); 
              if (customText === null) setRawData(''); 
              setViewMode('map'); setIsToolPanelOpen(false); setIsImportModalOpen(false);
              if (!isAppend) setTimeout(() => fitToScreenSafe(processed, exportFlipX, exportFlipY), 50);
              
              setMessage({ text: 'Mapa cargado correctamente.', type: 'success' });
            } catch (err) { setMessage({ text: 'Error procesando el mapa.', type: 'error' }); }
          }, [rawData, data, exportFlipX, exportFlipY, fitToScreenSafe, processDictionaryData]);

          const isTraceable = selectedFeature ? (NETWORK_CLASSES.includes(selectedFeature.class) || [39, 1122, 1123, 1369, 1113, 190, 1373, 111].includes(selectedFeature.class)) : false;

          const getFeatureClassName = (el) => {
              if (!el) return 'Elemento Desconocido';
              const name = classDictionary[el.class];
              return name ? name : `Clase ${el.class}`;
          };

          // --- 4. Motor de Renderizado ---
          useEffect(() => {
            if (!data || viewMode !== 'map' || !canvasRef.current) return;
            const c = canvasRef.current, ctx = c.getContext('2d'), dpr = window.devicePixelRatio || 1, rect = c.getBoundingClientRect();
            c.width = rect.width * dpr; c.height = rect.height * dpr; ctx.scale(dpr, dpr);
            ctx.fillStyle = '#fdfdfd'; ctx.fillRect(0, 0, rect.width, rect.height);
            
            const rx = (x) => transform.x + getRenderX(x, exportFlipX) * transform.scale;
            const ry = (y) => transform.y + getRenderY(y, exportFlipY) * transform.scale;
            
            const ctGroups = {};
            data.elements.forEach(el => {
                if (el.class === 1113 && el.master != null) {
                    const k = String(el.master);
                    if (!ctGroups[k]) ctGroups[k] = []; ctGroups[k].push(el);
                }
            });

            const terminalsToDraw = [], nodeLayoutCache = {}; 
            const drawnTexts = new Set(); // Filtro Anti-Repetición de fuentes

            // Helper para evitar textos solapados exactos o cercanos
            const checkAndRegisterText = (text, screenX, screenY, tolerance = 15) => {
                const key = `${text}_${Math.round(screenX/tolerance)}_${Math.round(screenY/tolerance)}`;
                if (drawnTexts.has(key)) return true;
                drawnTexts.add(key);
                return false;
            };

            // 1. CAPA BASE Y CALLES: Fondo (Manzanas y Ejes viales)
            data.elements.forEach(el => {
              if (el._stdCoords) {
                  if (el.class === 1 || el.class === 1219) {
                      ctx.beginPath(); let m = true;
                      for (let i = 0; i < el._stdCoords.length; i += 2) { const sx = rx(el._stdCoords[i]), sy = ry(el._stdCoords[i+1]); if (m) { ctx.moveTo(sx, sy); m = false; } else ctx.lineTo(sx, sy); }
                      ctx.closePath(); ctx.fillStyle = el.class === 1 ? '#f4f4ec' : '#f8f8f2'; ctx.fill(); ctx.strokeStyle = '#cbd5e1'; ctx.lineWidth = 0.8; ctx.stroke();
                  } else if (!NETWORK_CLASSES.includes(el.class) && !POLE_CLASSES.includes(el.class) && !CT_CLASSES.includes(el.class)) {
                      ctx.beginPath(); let m = true;
                      for (let i = 0; i < el._stdCoords.length; i += 2) { const sx = rx(el._stdCoords[i]), sy = ry(el._stdCoords[i+1]); if (m) { ctx.moveTo(sx, sy); m = false; } else ctx.lineTo(sx, sy); }
                      ctx.strokeStyle = 'rgba(203, 213, 225, 0.4)'; ctx.lineWidth = 1.0; ctx.stroke();
                  }
              }
            });

            // 1.5 CAPA DE TEXTOS DE CALLE (Inteligente)
            data.elements.forEach(el => {
                const isStreetElement = el.class === -2 || el.class === -3 || el.class === 1 || el.class === 1219;
                if (isStreetElement && !showStreetNames) return;

                if (el.text && Array.isArray(el.text) && isStreetElement) {
                    el.text.forEach(t => {
                        const rawTextStr = t.str !== undefined ? t.str : (t.text !== undefined ? t.text : t.val);
                        if (rawTextStr === undefined || rawTextStr === null || String(rawTextStr).trim() === '') return;
                        
                        let displayStr = String(rawTextStr);
                        if (isStreetElement) {
                            if (streetDictionary[displayStr]) displayStr = streetDictionary[displayStr];
                            else if (streetDictionary[Math.round(Number(displayStr))]) displayStr = streetDictionary[Math.round(Number(displayStr))];
                        }
                        
                        const tx = rx(t.x), ty = ry(t.y);
                        if (tx < -100 || tx > rect.width + 100 || ty < -100 || ty > rect.height + 100) return;

                        if (checkAndRegisterText(displayStr, tx, ty, 15)) return;

                        ctx.save(); ctx.translate(tx, ty);
                        
                        if (t.ang !== undefined || t.rot !== undefined) {
                            let angDeg = t.ang !== undefined ? t.ang : t.rot;
                            let angleRad = angDeg * Math.PI / 180;
                            if (exportFlipY) angleRad = -angleRad;
                            if (exportFlipX) angleRad = Math.PI - angleRad;
                            ctx.rotate(angleRad);
                        }

                        const baseSize = t.h || t.size || 2.0;
                        const fontSize = Math.max(7.5, baseSize * transform.scale * 1.5); 
                        
                        if (fontSize >= 7.5) {
                            ctx.font = `600 ${fontSize}px "Segoe UI", Arial, sans-serif`;
                            ctx.fillStyle = '#000000'; ctx.textAlign = 'center'; ctx.textBaseline = 'bottom';
                            ctx.fillText(displayStr, 0, -1);
                        }
                        ctx.restore();
                    });
                }
            });

            // 1.6 Nombres de Calles y Alturas calculadas (SOLO clase -2)
            if (showStreetNames) {
                data.elements.forEach(el => {
                    if (el.class === -2 && el._stdCoords && el._stdCoords.length >= 4) {
                        let maxLenSq = -1, bestSx1 = 0, bestSy1 = 0, bestSx2 = 0, bestSy2 = 0;
                        for(let i=0; i<el._stdCoords.length-3; i+=2) {
                            const sx1 = rx(el._stdCoords[i]), sy1 = ry(el._stdCoords[i+1]), sx2 = rx(el._stdCoords[i+2]), sy2 = ry(el._stdCoords[i+3]);
                            const lenSq = (sx2 - sx1)**2 + (sy2 - sy1)**2;
                            if (lenSq > maxLenSq) { maxLenSq = lenSq; bestSx1 = sx1; bestSy1 = sy1; bestSx2 = sx2; bestSy2 = sy2; }
                        }
                        const dx = bestSx2 - bestSx1, dy = bestSy2 - bestSy1, len = Math.sqrt(maxLenSq);

                        if (len > 0) {
                            let angRad = Math.atan2(dy, dx), flipped = false;
                            if (angRad > Math.PI/2 || angRad < -Math.PI/2) { angRad += Math.PI; flipped = true; }

                            let displayStr = null;
                            const streetId = el.street || el.calle || el.st;
                            if (streetId && streetDictionary[String(streetId)]) displayStr = streetDictionary[String(streetId)];
                            else if (el.name && isNaN(Number(el.name))) displayStr = el.name;

                            if (displayStr && len > 30) {
                                const mx = (bestSx1 + bestSx2) / 2, my = (bestSy1 + bestSy2) / 2;
                                if (mx > 0 && mx < rect.width && my > 0 && my < rect.height) {
                                    if (!checkAndRegisterText(displayStr, mx, my, 25)) {
                                        const fontSize = Math.max(7.5, 1.5 * transform.scale); 
                                        if (fontSize >= 7.5 && fontSize < 150) {
                                            ctx.save(); ctx.translate(mx, my); ctx.rotate(angRad);
                                            ctx.font = `${fontSize}px "Segoe UI", Arial, sans-serif`;
                                            ctx.textAlign = 'center'; ctx.textBaseline = flipped ? 'top' : 'bottom';
                                            ctx.fillStyle = '#000000'; ctx.fillText(displayStr, 0, flipped ? 2 : -2); ctx.restore();
                                        }
                                    }
                                }
                            }

                            const drawNum = (obj, isStart) => {
                                if (obj && obj.num !== undefined && isValidNum(obj.x) && isValidNum(obj.y)) {
                                    const nx = rx(obj.x), ny = ry(obj.y);
                                    if (nx > 0 && nx < rect.width && ny > 0 && ny < rect.height) {
                                        const numSize = Math.max(4.5, 0.8 * transform.scale);
                                        if (numSize >= 4.5 && numSize < 100) {
                                            let sDx, sDy;
                                            if (isStart) {
                                                sDx = rx(el._stdCoords[2]) - rx(el._stdCoords[0]);
                                                sDy = ry(el._stdCoords[3]) - ry(el._stdCoords[1]);
                                            } else {
                                                const l = el._stdCoords.length;
                                                sDx = rx(el._stdCoords[l-2]) - rx(el._stdCoords[l-4]);
                                                sDy = ry(el._stdCoords[l-1]) - ry(el._stdCoords[l-3]);
                                            }
                                            let sLen = Math.hypot(sDx, sDy);
                                            if (sLen === 0) { sDx = dx; sDy = dy; sLen = len; }
                                            
                                            const pushDist = numSize * 1.5; 
                                            const px = nx + (isStart ? (sDx/sLen) * pushDist : -(sDx/sLen) * pushDist);
                                            const py = ny + (isStart ? (sDy/sLen) * pushDist : -(sDy/sLen) * pushDist);

                                            if (checkAndRegisterText(obj.num, px, py, 15)) return;

                                            ctx.save();
                                            ctx.translate(px, py);
                                            
                                            let sAngRad = Math.atan2(sDy, sDx), sFlipped = false;
                                            if (sAngRad > Math.PI/2 || sAngRad < -Math.PI/2) { sAngRad += Math.PI; sFlipped = true; }
                                            
                                            ctx.rotate(sAngRad); ctx.font = `600 ${numSize}px "Segoe UI", Arial, sans-serif`;
                                            ctx.fillStyle = '#9ca3af'; ctx.textAlign = 'center'; ctx.textBaseline = sFlipped ? 'top' : 'bottom';
                                            ctx.fillText(String(obj.num), 0, sFlipped ? 1 : -1); ctx.restore();
                                        }
                                    }
                                }
                            };
                            drawNum(el.from, true); drawNum(el.to, false);
                        }
                    }
                });
            }

            // 2. CAPA INFERIOR: Red BT/MT y Puentes con Trazos Reales
            data.elements.forEach(el => {
              if (!showMT && MT_LINE_CLASSES.includes(el.class)) return; 
              if (el._stdCoords && NETWORK_CLASSES.includes(el.class)) {
                const isSel = selectedFeature?.id === el.id || pairedFeatureId === String(el.id);
                const isHov = hoveredFeature?.id === el.id;
                const s = getElementStyle(el, isSel, isHov);
                if (onlyShowConnected && !s.isConnected) return;
                
                ctx.save(); ctx.globalAlpha = s.opacity; ctx.beginPath(); let m = true;
                for (let i = 0; i < el._stdCoords.length; i += 2) { const sx = rx(el._stdCoords[i]), sy = ry(el._stdCoords[i+1]); if (m) { ctx.moveTo(sx, sy); m = false; } else ctx.lineTo(sx, sy); }
                ctx.strokeStyle = s.stroke; 
                
                if (el.class === 1097 || el.class === 'Puente') { 
                    ctx.lineWidth = isSel ? 6 : (isHov ? 5 : 4); 
                    ctx.setLineDash([]); 
                } else {
                    ctx.lineWidth = isSel ? 3.5 : (isHov ? 2.5 : (s.isConnected ? 2.2 : 1.4)); 
                    
                    let dashArray = [];
                    if (el['line-type'] && lineDictionary[el['line-type']]) {
                        dashArray = lineDictionary[el['line-type']].map(v => v * 3.5);
                    } else {
                        if (el.class === 1091) dashArray = lineDictionary['cusmt'] ? lineDictionary['cusmt'].map(v=>v*3.5) : [10.5, 5.25];
                        else if (el.class === 1095) dashArray = lineDictionary['casbt'] ? lineDictionary['casbt'].map(v=>v*3.5) : [1.75, 1.75];
                        else if (el.class === 1089) dashArray = [];
                        else if (el.class === 1093) dashArray = [];
                        else if (el.class === 1094) dashArray = [2, 2];
                    }
                    ctx.setLineDash(dashArray);
                }
                ctx.stroke(); ctx.restore();
              }
            });

            const renderCTFromDictionary = (ct, s, r, isSel, isHov) => {
                const ids = (Array.isArray(ct.gs) && ct.gs.length > 0) ? ct.gs : [ct.class];
                for (const gId of ids) {
                    const gDef = graphicsDictionary[gId];
                    if (!gDef || !Array.isArray(gDef.gs)) continue;
                    const scale = Math.max(0.01, (r / 2.5) * (isValidNum(gDef.scale) ? gDef.scale : 1));
                    try {
                        ctx.save();
                        ctx.scale(scale, scale);
                        for (const g of gDef.gs) {
                            const attr = g?.attr || {};
                            const stroke = isSel ? '#ef4444' : (isHov ? '#3b82f6' : (attr.stroke || s.stroke));
                            const fill = isSel ? '#ef4444' : (isHov ? '#3b82f6' : (attr.fill || s.fill || '#ffffff'));
                            const lineW = ((isValidNum(attr['stroke-width']) ? attr['stroke-width'] : 0.1) / scale) * 2.5;
                            const willStroke = attr.stroke === undefined || attr.stroke !== 'none';
                            const willFill = attr.fill !== undefined && attr.fill !== 'none';
                            const oldAlpha = ctx.globalAlpha;
                            if (isValidNum(attr['fill-opacity']) && !isSel && !isHov) ctx.globalAlpha = oldAlpha * attr['fill-opacity'];

                            ctx.strokeStyle = stroke; ctx.fillStyle = fill; ctx.lineWidth = lineW;
                            if (attr.d) {
                                const path = new Path2D(attr.d);
                                if (willFill) ctx.fill(path);
                                if (willStroke) ctx.stroke(path);
                            } else if (isValidNum(attr.x1) && isValidNum(attr.y1) && isValidNum(attr.x2) && isValidNum(attr.y2)) {
                                ctx.beginPath(); ctx.moveTo(attr.x1, attr.y1); ctx.lineTo(attr.x2, attr.y2); if (willStroke) ctx.stroke();
                            } else if (isValidNum(attr.r)) {
                                ctx.beginPath(); ctx.arc(attr.cx || 0, attr.cy || 0, attr.r, 0, 2*Math.PI); if (willFill) ctx.fill(); if (willStroke) ctx.stroke();
                            } else if (isValidNum(attr.width) && isValidNum(attr.height)) {
                                ctx.beginPath(); ctx.rect(attr.x || 0, attr.y || 0, attr.width, attr.height); if (willFill) ctx.fill(); if (willStroke) ctx.stroke();
                            } else if (attr.points) {
                                const pts = String(attr.points).trim().split(/\s+|,/).map(Number).filter(n => !isNaN(n));
                                if (pts.length >= 4) { ctx.beginPath(); ctx.moveTo(pts[0], pts[1]); for (let i = 2; i < pts.length - 1; i += 2) ctx.lineTo(pts[i], pts[i+1]); if (willFill) ctx.fill(); if (willStroke) ctx.stroke(); }
                            }
                            ctx.globalAlpha = oldAlpha;
                        }
                        ctx.restore();
                        return true;
                    } catch (e) {
                        try { ctx.restore(); } catch (_) {}
                    }
                }
                return false;
            };

            const renderNode = (el, isHighlightRender = false) => {
                if (!showMT && MT_POLE_CLASSES.includes(el.class)) return; 
                if (!isNodeValid(el) || CT_CLASSES.includes(el.class)) return;
                
                const edit = manualEdits[el.id] || { dx: 0, dy: 0, rot: 0 };
                const fx = el.x + (el._autoDx || 0) + edit.dx;
                const fy = el.y + (el._autoDy || 0) + edit.dy;
                const isSel = selectedFeature?.id === el.id || pairedFeatureId === String(el.id);
                const isHov = hoveredFeature?.id === el.id;
                const s = getElementStyle(el, isSel, isHov);
                if (onlyShowConnected && !s.isConnected) return;
                
                let sx = rx(fx), sy = ry(fy);
                const r = Math.max(s.minPixels, s.worldSize * transform.scale);
                
                let snappedEnd = null;
                if (el.class === 52) { 
                    const snap = getNearestNetworkPoint(fx, fy); 
                    if (snap) { sx = rx(snap.x); sy = ry(snap.y); } 
                } else if ([1122, 1123, 1369].includes(el.class)) {
                    snappedEnd = pillarSnaps[el.id];
                    if (snappedEnd) { sx = rx(snappedEnd.x); sy = ry(snappedEnd.y); }
                }
                
                ctx.save();
                ctx.globalAlpha = s.opacity;
                ctx.translate(sx, sy);
                const streetAng = getStreetAngleAt(fx, fy) + edit.rot;
                
                let rawAngDeg = null;
                if (el.ang !== undefined) rawAngDeg = el.ang;

                let angleRad = 0;
                if (rawAngDeg !== null) {
                    let rotRad = (rawAngDeg * Math.PI) / 180;
                    if (exportFlipY) rotRad = -rotRad;
                    if (exportFlipX) rotRad = Math.PI - rotRad;
                    angleRad = rotRad + (edit.rot * Math.PI) / 180;
                } else {
                    angleRad = (streetAng * Math.PI) / 180;
                    angleRad += (edit.rot * Math.PI) / 180;
                }

                let graphicIds = el.gs && el.gs.length > 0 ? el.gs : [el.class];
                let renderedCustomGraphic = false;
                
                graphicIds.forEach(gId => {
                    const gDef = graphicsDictionary[gId];
                    if (gDef && gDef.gs) {

                                <p className="font-bold text-blue-800 uppercase text-[9px] flex items-center gap-1"><IconZap className="w-3 h-3"/> Conexión ({connectedIds.size})</p>
                                <label className="flex items-center gap-2 cursor-pointer font-medium"><input type="checkbox" checked={highlightConnected} onChange={e => setHighlightConnected(e.target.checked)} /> Resaltar</label>
                                <label className="flex items-center gap-2 cursor-pointer font-medium"><input type="checkbox" checked={onlyShowConnected} onChange={e => setOnlyShowConnected(e.target.checked)} /> Solo conectados</label>
                                <button onClick={() => { setConnectedIds(new Set()); setOnlyShowConnected(false); setHighlightConnected(true); }} className="w-full py-1 bg-red-50 text-red-600 border border-red-200 rounded text-[9px] font-bold">Limpiar</button>
                              </div>
                            )}
                          </div>
                        )}
                      </div>
                    </div>
                    {selectedFeature && (
                      <div className="absolute right-6 top-6 w-80 max-h-[calc(100vh-3rem)] bg-white shadow-2xl rounded-lg overflow-hidden border border-slate-600 z-50 flex flex-col text-xs">
                        <div className="bg-blue-800 text-white px-4 py-3 flex justify-between items-center shadow-md shrink-0 z-10">
                          <span className="font-bold tracking-tight uppercase truncate" title={getFeatureClassName(selectedFeature)}>
                             {getFeatureClassName(selectedFeature)} (ID: {String(selectedFeature.id || 'N/A')})
                          </span>
                          <button onClick={() => { setSelectedFeature(null); setLinkingMode(null); }} className="hover:bg-red-500 p-1 rounded-full"><IconX className="w-4 h-4" /></button>
                        </div>
                        
                        <div className="flex-1 overflow-y-auto flex flex-col bg-white">
                            <div className="text-slate-900 shrink-0">
                              <table className="w-full border-collapse text-left">
                                <tbody>
                                  {Object.entries(selectedFeature).map(([k, v]) => {
                                    if (['text', 'x', 'y', '_stdCoords', '_autoDx', '_autoDy', '_overlapIdx'].includes(k)) return null;
                                    
                                    // 2. Traductor de Atributos Humanos (Metamodel)
                                    let displayKey = k;
                                    if (attrDictionary && attrDictionary[k]) {
                                        displayKey = typeof attrDictionary[k] === 'string' ? attrDictionary[k] : (attrDictionary[k].caption || k);
                                    }

                                    let displayVal = String(v);
                                    if (k === 'area' && areaDictionary && areaDictionary[v]) {
                                        displayVal = `${areaDictionary[v]} (${v})`;
                                    }

                                    return (
                                      <tr key={k} className="border-b border-slate-100 hover:bg-slate-50">
                                        <td className="p-2.5 bg-slate-50 font-bold text-slate-600 w-1/3 text-[10px] capitalize">{displayKey.replace(/_/g, ' ')}</td>
                                        <td className="p-2.5 font-mono text-[10px] text-slate-900 break-all">{displayVal}</td>
                                      </tr>
                                    );
                                  })}
                                </tbody>
                              </table>
                            </div>
                            
                            {([1122, 1123, 1369, 111, 190, 1373].includes(selectedFeature.class)) && (
                                <div className="bg-white p-3 border-t border-slate-300 shrink-0">
                                    <p className="text-[10px] font-bold text-slate-700 uppercase mb-2">Vínculo de Suministro</p>
                                    {currentManualLink ? (
                                        <div className="flex justify-between items-center bg-slate-50 p-2 rounded border border-slate-200">
                                            <span className="text-[10px] font-mono font-bold text-slate-800">
                                                Fijado a ID: {currentManualLink}
                                            </span>
                                            <button 
                                                onClick={() => removeManualLink(String(selectedFeature.id))} 
                                                className="text-red-500 hover:text-red-700 font-bold text-[9px] uppercase tracking-wider"
                                            >
                                                [ Desvincular ]
                                            </button>
                                        </div>
                                    ) : (
                                        <button 
                                            onClick={() => {
                                                if (linkingMode && linkingMode.id === selectedFeature.id) {
                                                    setLinkingMode(null);
                                                } else {
                                                    setLinkingMode({ 
                                                        id: selectedFeature.id, 
                                                        type: [111, 190, 1373].includes(selectedFeature.class) ? 'supply' : 'pillar' 
                                                    });
                                                }
                                            }}
                                            className={`w-full py-1.5 rounded text-[9px] font-bold uppercase transition-colors shadow-sm ${linkingMode && linkingMode.id === selectedFeature.id ? 'bg-amber-500 text-white animate-pulse' : 'bg-slate-200 text-slate-700 hover:bg-slate-300'}`}
                                        >
                                            {linkingMode && linkingMode.id === selectedFeature.id ? 'Selecciona destino en el mapa...' : 'Vincular Manualmente'}
                                        </button>
                                    )}
                                </div>
                            )}

                            {isTraceable && (
                                <div className="bg-slate-100 p-3 border-t border-slate-300 shrink-0">
                                    <div className="flex justify-between items-center mb-2">
                                        <p className="text-[10px] font-bold text-slate-700 uppercase flex items-center gap-1">
                                            <IconZap className="w-3 h-3 text-blue-600" /> Trazabilidad de Red
                                        </p>
                                        {connectedIds.size > 0 && (
                                            <button 
                                                onClick={() => { setConnectedIds(new Set()); setHighlightConnected(false); }} 
                                                className="text-[9px] font-bold text-red-600 hover:text-red-800 transition-colors"
                                            >
                                                [ Limpiar ]
                                            </button>
                                        )}
                                    </div>
                                    <div className="flex flex-col gap-1.5">
                                        <button 
                                            onClick={() => handleTrace('continuity')} 
                                            className="w-full bg-blue-600 text-white font-bold py-1.5 rounded text-[9px] hover:bg-blue-700 transition-colors shadow-sm"
                                        >
                                            Continuidad del Tramo
                                        </button>
                                        {!NETWORK_CLASSES.includes(selectedFeature.class) && (
                                            <div className="flex gap-1.5 w-full">
                                                <button 
                                                    onClick={() => handleTrace('upstream')} 
                                                    className="flex-1 bg-amber-600 text-white font-bold py-1.5 rounded text-[9px] hover:bg-amber-700 transition-colors shadow-sm"
                                                >
                                                    Aguas Arriba
                                                </button>
                                                <button 
                                                    onClick={() => handleTrace('downstream')} 
                                                    className="flex-1 bg-slate-700 text-white font-bold py-1.5 rounded text-[9px] hover:bg-slate-800 transition-colors shadow-sm"
                                                >
                                                    Aguas Abajo (Al CT)
                                                </button>
                                            </div>
                                        )}
                                    </div>
                                </div>
                            )}

                            {!NETWORK_CLASSES.includes(selectedFeature.class) && (
                              <div className="bg-white p-3 border-t border-slate-300 shrink-0">
                                <p className="text-[10px] font-bold text-slate-700 uppercase mb-2">Ajuste Manual</p>
                                <div className="flex gap-2 mb-2">
                                  <label className="flex-1 text-[9px] font-bold text-slate-600">Desfase X
                                    <input type="number" step="0.5" value={manualEdits[selectedFeature.id]?.dx || 0} onChange={e => handleManualEdit(selectedFeature.id, 'dx', e.target.value)} className="w-full mt-1 p-1 border rounded text-slate-800 font-mono" />
                                  </label>
                                  <label className="flex-1 text-[9px] font-bold text-slate-600">Desfase Y
                                    <input type="number" step="0.5" value={manualEdits[selectedFeature.id]?.dy || 0} onChange={e => handleManualEdit(selectedFeature.id, 'dy', e.target.value)} className="w-full mt-1 p-1 border rounded text-slate-800 font-mono" />
                                  </label>
                                </div>
                                <label className="block text-[9px] font-bold text-slate-600 mb-2">Rotación ({Math.round(manualEdits[selectedFeature.id]?.rot || 0)}°)
                                  <input type="range" min="-180" max="180" step="1" value={manualEdits[selectedFeature.id]?.rot || 0} onChange={e => handleManualEdit(selectedFeature.id, 'rot', e.target.value)} className="w-full mt-1 accent-blue-600" />
                                </label>
                              </div>
                            )}
                        </div>
                        <div className="bg-slate-50 px-4 py-2 border-t border-slate-300 text-[9px] text-slate-500 font-bold text-center uppercase tracking-widest shrink-0">Información Técnica</div>
                      </div>
                    )}
                  </>
                ) : (
                  <div className="absolute inset-0 bg-slate-100 p-6 flex flex-col text-slate-800 overflow-y-auto">
                    <div className="max-w-3xl mx-auto w-full bg-white rounded shadow p-6 border border-slate-200">
                      
                      {message && (
                          <div className={`mb-4 px-3 py-2 rounded text-xs font-bold ${message.type === 'error' ? 'bg-red-100 text-red-700 border border-red-200' : 'bg-green-100 text-green-800 border border-green-200'}`}>
                              {message.text}
                          </div>
                      )}

                      <div className="mb-6">
                          <h2 className="font-bold mb-2 flex items-center gap-2 text-sm text-blue-800 uppercase">
                              <IconLayers className="w-4 h-4"/> 1. Datos del Mapa Espacial
                          </h2>
                          <p className="text-[10px] text-slate-500 mb-2">Pega aquí el código que extraes del panel de Red.</p>
                          <textarea className="w-full h-48 p-4 font-mono text-[10px] bg-slate-50 border border-slate-300 rounded outline-none resize-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500" placeholder="Pega aquí los datos..." value={rawData} onChange={e => setRawData(e.target.value)} />
                          <div className="mt-2 flex gap-2">
                            <button onClick={() => processData(false)} className="bg-blue-600 text-white font-bold py-2 px-4 rounded text-xs hover:bg-blue-700 shadow">Cargar Mapa Nuevo</button>
                          </div>
                      </div>

                      <div className="border-t border-slate-200 pt-6">
                          <h2 className="font-bold mb-2 flex items-center gap-2 text-sm text-amber-700 uppercase">
                              <IconFileText className="w-4 h-4"/> 2. Diccionarios del Sistema (Opcional)
                          </h2>
                          <p className="text-[10px] text-slate-500 mb-2">Pega aquí los archivos <strong>areas.js, colors.js, metamodel.js</strong> o <strong>graphics1.js</strong> para cargar su contenido real.</p>
                          <textarea className="w-full h-24 p-3 font-mono text-[10px] bg-amber-50 border border-amber-200 rounded outline-none resize-none focus:border-amber-500 focus:ring-1 focus:ring-amber-500" placeholder='Ejemplo: GRAPHICS = { ... }' value={dictRawData} onChange={e => setDictRawData(e.target.value)} />
                          <div className="mt-2 flex items-center gap-3 flex-wrap">
                            <button onClick={() => processDictionaryData(dictRawData)} className="bg-amber-600 text-white font-bold py-2 px-4 rounded text-xs hover:bg-amber-700 shadow transition-colors">Aprender Diccionario</button>
                            
                            {Object.keys(streetDictionary).length > 0 && (
                                <span className="py-1 px-3 text-[10px] font-bold text-green-700 bg-green-100 border border-green-200 rounded-full animate-pulse">✓ {Object.keys(streetDictionary).length} Calles</span>
                            )}
                            {Object.keys(classDictionary).length > Object.keys(DEFAULT_CLASSES).length && (
                                <span className="py-1 px-3 text-[10px] font-bold text-green-700 bg-green-100 border border-green-200 rounded-full animate-pulse">✓ {Object.keys(classDictionary).length} Clases</span>
                            )}
                            {Object.keys(areaDictionary).length > 0 && (
                                <span className="py-1 px-3 text-[10px] font-bold text-green-700 bg-green-100 border border-green-200 rounded-full animate-pulse">✓ {Object.keys(areaDictionary).length} Áreas</span>
                            )}
                            {Object.keys(graphicsDictionary).length > Object.keys(HARDCODED_GRAPHICS).length && (
                                <span className="py-1 px-3 text-[10px] font-bold text-green-700 bg-green-100 border border-green-200 rounded-full animate-pulse">✓ {Object.keys(graphicsDictionary).length} Gráficos</span>
                            )}
                            {Object.keys(attrDictionary).length > Object.keys(HARDCODED_ATTRS).length && (
                                <span className="py-1 px-3 text-[10px] font-bold text-green-700 bg-green-100 border border-green-200 rounded-full animate-pulse">✓ {Object.keys(attrDictionary).length} Atributos</span>
                            )}
                          </div>
                      </div>

                    </div>
                  </div>
                )}
              </main>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
