<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Explorador de Catálogo Gráfico</title>
    
    <!-- Librerías de React y Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        /* Patrón de cuadrícula para el lienzo */
        .bg-grid {
            background-size: 40px 40px;
            background-image: 
                linear-gradient(to right, rgba(203, 213, 225, 0.4) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(203, 213, 225, 0.4) 1px, transparent 1px);
            background-position: center center;
        }
        /* Barra de desplazamiento moderna y estética */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans m-0 p-0 w-screen h-screen overflow-hidden flex flex-col">
    
    <!-- Contenedor principal anclado al 100% de la pantalla -->
    <div id="root" class="w-full h-full flex overflow-hidden"></div>

    <script type="text/babel">
        const { useState, useRef, useEffect, useMemo, useCallback } = React;

        // --- Íconos SVG ---
        const IconUpload = () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="w-5 h-5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>;
        const IconSearch = () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="w-4 h-4"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>;
        const IconZoomIn = () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="w-5 h-5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="11" y1="8" x2="11" y2="14"/><line x1="8" y1="11" x2="14" y2="11"/></svg>;
        const IconZoomOut = () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="w-5 h-5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="8" y1="11" x2="14" y2="11"/></svg>;
        const IconReset = () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="w-5 h-5"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>;
        const IconImage = () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="w-4 h-4"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>;

        function App() {
            const [data, setData] = useState({ classes: {}, graphics: {}, lines: {} });
            const [selectedId, setSelectedId] = useState(null);
            const [searchTerm, setSearchTerm] = useState('');
            const [viewMode, setViewMode] = useState('upload'); 
            const [loadingError, setLoadingError] = useState(null);

            const [transform, setTransform] = useState({ x: 400, y: 300, scale: 20 });
            const [isDragging, setIsDragging] = useState(false);
            const [dragStart, setDragStart] = useState({ x: 0, y: 0 });
            const svgContainerRef = useRef(null);

            // --- PROCESAMIENTO DE DATOS ---
            const processScriptData = (text, sourceName = 'input') => {
                try {
                    // Evitar bloqueos de variables inyectando directamente a window
                    const safeText = text.replace(/(?:var\s+|let\s+|const\s+)?\b(GRAPHICS|CLASSES|CUSTOM_LINE|STREETS|AREANAMES|ATTRDEFS)\s*=/g, 'window.$1 =');
                    const executeScript = new Function(safeText);
                    executeScript();

                    setData(prev => {
                        const newData = {
                            classes: window.CLASSES || prev.classes || {},
                            graphics: window.GRAPHICS || prev.graphics || {},
                            lines: window.CUSTOM_LINE || prev.lines || {}
                        };
                        
                        if (Object.keys(newData.graphics).length > 0 || Object.keys(newData.classes).length > 0 || Object.keys(newData.lines).length > 0) {
                            setViewMode('explore');
                        }
                        return newData;
                    });
                    setLoadingError(null);
                } catch (err) {
                    console.error(err);
                    setLoadingError(`No se pudo leer el archivo. Intenta de nuevo.`);
                }
            };

            const handleDrop = (e) => {
                e.preventDefault();
                const files = Array.from(e.dataTransfer.files);
                if (files.length === 0) return;
                files.forEach(file => {
                    const reader = new FileReader();
                    reader.onload = (ev) => processScriptData(ev.target.result, file.name);
                    reader.readAsText(file);
                });
            };

            // --- CATÁLOGO Y BUSCADOR OPTIMIZADO ---
            const baseCatalog = useMemo(() => {
                try {
                    const items = [];
                    const classes = data.classes || {};
                    const graphics = data.graphics || {};
                    const lines = data.lines || {};
                    
                    const allIds = new Set([...Object.keys(classes), ...Object.keys(graphics), ...Object.keys(lines)]);
                    
                    allIds.forEach(id => {
                        const cls = classes[id];
                        const grp = graphics[id];
                        const line = lines[id];
                        
                        let rawDesc = 'Elemento Desconocido';
                        if (cls && cls.description) rawDesc = cls.description;
                        else if (line && line.desc) rawDesc = `Línea: ${line.desc}`;
                        else if (grp) rawDesc = 'Símbolo Gráfico';

                        items.push({
                            id: String(id),
                            description: String(rawDesc),
                            type: cls ? cls.type : (line ? 'LINE' : 'GRP'),
                            hasGraphic: !!grp || !!line,
                            isLine: !!line
                        });
                    });
                    return items.sort((a, b) => a.description.localeCompare(b.description));
                } catch (err) { return []; }
            }, [data]);

            const catalogItems = useMemo(() => {
                if (!searchTerm) return baseCatalog;
                const lowerTerm = String(searchTerm).toLowerCase();
                return baseCatalog.filter(item => {
                    const desc = item.description ? String(item.description).toLowerCase() : '';
                    const idStr = item.id ? String(item.id).toLowerCase() : '';
                    return desc.includes(lowerTerm) || idStr.includes(lowerTerm);
                });
            }, [baseCatalog, searchTerm]);

            // OPTIMIZACIÓN CRÍTICA: Solo renderizamos máximo 500 items a la vez para que no se congele el navegador
            const visibleItems = catalogItems.slice(0, 500);

            // --- CONTROLES DEL LIENZO ---
            const resetView = useCallback(() => {
                setTimeout(() => {
                    if (!svgContainerRef.current) return;
                    const rect = svgContainerRef.current.getBoundingClientRect();
                    setTransform({ x: Math.round((rect.width || 800) / 2), y: Math.round((rect.height || 600) / 2), scale: 20 });
                }, 50);
            }, []);

            useEffect(() => { resetView(); }, [selectedId, resetView]);

            const handleWheel = (e) => {
                e.preventDefault();
                const zoomFactor = Math.exp(-e.deltaY * 0.002);
                if (!svgContainerRef.current) return;
                const rect = svgContainerRef.current.getBoundingClientRect();
                const mouseX = e.clientX - rect.left;
                const mouseY = e.clientY - rect.top;

                setTransform(prev => {
                    const newScale = Math.max(0.1, Math.min(prev.scale * zoomFactor, 1000));
                    return {
                        scale: newScale,
                        x: mouseX - (mouseX - prev.x) * (newScale / prev.scale),
                        y: mouseY - (mouseY - prev.y) * (newScale / prev.scale)
                    };
                });
            };

            const handleMouseDown = (e) => {
                setIsDragging(true);
                setDragStart({ x: e.clientX - transform.x, y: e.clientY - transform.y });
            };

            const handleMouseMove = (e) => {
                if (isDragging) {
                    setTransform(prev => ({ ...prev, x: e.clientX - dragStart.x, y: e.clientY - dragStart.y }));
                }
            };

            // --- MOTOR DE DIBUJO BLINDADO ---
            const mapSvgProps = (attr, currentScale) => {
                if (typeof attr !== 'object' || attr === null) return {};
                const safeProps = {};
                
                try {
                    // Convertir nombres a camelCase para React
                    for (const key in attr) {
                        const camelKey = key.replace(/-([a-z])/g, (g) => g[1].toUpperCase());
                        safeProps[camelKey] = attr[key];
                    }

                    // Corrección Anti-Manchas Negras
                    if (!safeProps.stroke && !safeProps.fill) {
                        safeProps.stroke = "#1e293b";
                        safeProps.fill = "none";
                    } else if (safeProps.stroke && !safeProps.fill) {
                        safeProps.fill = "none";
                    }

                    // Corrección de Líneas Microscópicas Invisibles
                    if (safeProps.strokeWidth !== undefined && safeProps.strokeWidth > 0) {
                        const visualThickness = safeProps.strokeWidth * currentScale;
                        if (visualThickness < 1.0) safeProps.strokeWidth = 1.0 / currentScale;
                    } else if (safeProps.stroke && safeProps.stroke !== 'none') {
                        safeProps.strokeWidth = 1.5 / currentScale;
                    }
                } catch(e) { /* Ignorar errores de mapeo */ }

                return safeProps;
            };

            const renderGraphicElements = (graphic, lineDef) => {
                try {
                    if (lineDef) {
                        let dashArray = 'none';
                        if (Array.isArray(lineDef.value)) dashArray = lineDef.value.join(',');
                        else if (lineDef.value) dashArray = String(lineDef.value);
                        
                        return (
                            <g>
                                <line x1="-50" y1="0" x2="50" y2="0" stroke="#2563eb" strokeWidth={2 / transform.scale} strokeDasharray={dashArray} />
                                <text x="0" y="-2" fontSize={12 / transform.scale} transform="scale(1,-1)" textAnchor="middle" fill="#64748b">{String(lineDef.desc || '')}</text>
                            </g>
                        );
                    }

                    if (!graphic) return null;

                    if (graphic.type === 1 && Array.isArray(graphic.gs)) {
                        return graphic.gs.map((shape, idx) => {
                            if (!shape || typeof shape !== 'object') return null;
                            const props = mapSvgProps(shape.attr, transform.scale);
                            switch (shape.type) {
                                case 1: return <line key={idx} {...props} />;
                                case 2: return <circle key={idx} cx={props.x || props.cx || 0} cy={props.y || props.cy || 0} r={props.r || props.radius || 1} {...props} />;
                                case 3: 
                                case 5: return <path key={idx} {...props} />;
                                case 4: return <text key={idx} x={props.x || 0} y={props.y || 0} {...props} transform="scale(1, -1)">{String(shape.text || shape.str || '')}</text>;
                                default: return null; 
                            }
                        });
                    }
                    
                    if (graphic.type === 2) {
                        return (
                            <g>
                                <line x1="-10" y1="0" x2="10" y2="0" stroke={graphic.color || "#000"} strokeWidth={graphic.scale || (2 / transform.scale)} strokeDasharray={graphic['line-type'] === 'continuous' ? 'none' : '5,5'} />
                            </g>
                        );
                    }
                    return null;
                } catch (e) {
                    return <text x="0" y="0" fontSize={12 / transform.scale} transform="scale(1,-1)" fill="red">No se pudo dibujar esta figura</text>;
                }
            };

            // --- VISTA PRINCIPAL ---
            if (viewMode === 'upload') {
                return (
                    <div className="flex-1 flex flex-col items-center justify-center bg-slate-100 h-full w-full" onDragOver={(e) => e.preventDefault()} onDrop={handleDrop}>
                        <div className="bg-white p-10 rounded-2xl shadow-xl max-w-2xl w-full border border-slate-200 text-center">
                            <div className="w-20 h-20 bg-blue-100 text-blue-600 rounded-full flex items-center justify-center mx-auto mb-6 shadow-inner"><IconUpload /></div>
                            <h1 className="text-3xl font-bold text-slate-800 mb-3">Laboratorio Gráfico</h1>
                            <p className="text-slate-500 mb-6">Selecciona todos tus archivos (.js) y arrástralos a esta ventana simultáneamente.</p>
                            {loadingError && <div className="text-red-600 text-sm font-bold bg-red-50 p-3 rounded-lg border border-red-200 mb-4">{loadingError}</div>}
                        </div>
                    </div>
                );
            }

            const currentGraphic = data.graphics[selectedId];
            const currentClass = data.classes[selectedId];
            const currentLine = data.lines[selectedId];

            return (
                <div className="flex w-full h-full overflow-hidden bg-slate-100">
                    
                    {/* BARRA LATERAL IZQUIERDA (CON SCROLL GARANTIZADO) */}
                    <div className="w-80 flex flex-col bg-white border-r border-slate-200 shadow-xl h-full shrink-0 z-20">
                        <div className="p-4 bg-slate-800 text-white flex justify-between items-center shrink-0">
                            <div>
                                <h2 className="font-bold text-sm tracking-wide">CATÁLOGO</h2>
                                <p className="text-[10px] text-slate-400 font-mono">Total: {catalogItems.length} figuras</p>
                            </div>
                            <button onClick={() => {setViewMode('upload'); setSearchTerm('');}} className="text-xs bg-slate-700 hover:bg-slate-600 px-3 py-1.5 rounded transition-colors font-bold">Volver</button>
                        </div>
                        
                        <div className="p-3 border-b border-slate-200 shrink-0 bg-slate-50 shadow-sm z-10">
                            <div className="relative">
                                <div className="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-slate-400"><IconSearch /></div>
                                <input 
                                    type="text" 
                                    placeholder="Buscar elemento..." 
                                    className="block w-full pl-9 pr-3 py-2.5 border border-slate-300 rounded-lg text-xs focus:ring-blue-500 focus:border-blue-500 outline-none shadow-sm" 
                                    value={searchTerm} 
                                    onChange={(e) => setSearchTerm(e.target.value)} 
                                />
                            </div>
                        </div>

                        {/* Contenedor de la lista con altura min-h-0 obligatoria para que el scroll funcione */}
                        <div className="flex-1 overflow-y-auto bg-white min-h-0">
                            {visibleItems.map(item => (
                                <button key={item.id} onClick={() => setSelectedId(item.id)} className={`w-full text-left p-3.5 border-b border-slate-100 flex flex-col hover:bg-blue-50 transition-colors ${selectedId === item.id ? 'bg-blue-100 border-l-4 border-blue-600' : 'border-l-4 border-transparent'}`}>
                                    <div className="flex justify-between items-center mb-1">
                                        <span className="font-bold text-xs text-slate-800 break-words">{item.description}</span>
                                    </div>
                                    <div className="flex items-center gap-2 text-[10px] text-slate-500 font-mono">
                                        <span className="bg-slate-200 px-1.5 py-0.5 rounded text-slate-700">ID: {item.id}</span>
                                        {item.hasGraphic && <span className="text-green-600 font-bold flex items-center gap-0.5"><IconImage className="w-3 h-3"/> {item.isLine ? 'Línea' : 'Gráfico'}</span>}
                                        {!item.hasGraphic && <span className="text-red-400">Sin gráfico</span>}
                                    </div>
                                </button>
                            ))}
                            {catalogItems.length > 500 && (
                                <div className="p-4 text-center text-[10px] text-amber-700 bg-amber-50 font-bold uppercase tracking-wider border-t border-amber-200">
                                    Mostrando 500 de {catalogItems.length} resultados.<br/>Usa el buscador para ver más.
                                </div>
                            )}
                            {catalogItems.length === 0 && (
                                <div className="p-8 text-center text-slate-500 text-sm italic">
                                    No hay resultados.
                                </div>
                            )}
                        </div>
                    </div>

                    {/* ÁREA PRINCIPAL DEL LIENZO */}
                    <div className="flex-1 flex flex-col h-full min-w-0 relative">
                        {selectedId ? (
                            <>
                                {/* Cabecera de la figura */}
                                <div className="bg-white border-b border-slate-200 px-6 py-4 shrink-0 flex justify-between items-center shadow-sm z-10">
                                    <div>
                                        <h2 className="text-xl font-bold text-slate-800 flex items-center gap-3">
                                            {currentClass?.description || currentLine?.desc || 'Figura sin nombre'} 
                                            <span className="text-xs font-mono bg-blue-100 text-blue-800 px-3 py-1 rounded-full">ID: {selectedId}</span>
                                        </h2>
                                        {currentClass?.category && <p className="text-xs text-slate-500 mt-1 uppercase tracking-wide font-bold">Categoría: {currentClass.category}</p>}
                                    </div>
                                    
                                    {/* Controles de Zoom Flotantes */}
                                    <div className="flex gap-2">
                                        <button onClick={() => setTransform(p => ({ ...p, scale: p.scale * 1.5 }))} className="w-10 h-10 bg-slate-50 border border-slate-200 rounded flex items-center justify-center hover:bg-slate-200 text-slate-700 transition-colors shadow-sm" title="Acercar"><IconZoomIn /></button>
                                        <button onClick={() => setTransform(p => ({ ...p, scale: p.scale * 0.7 }))} className="w-10 h-10 bg-slate-50 border border-slate-200 rounded flex items-center justify-center hover:bg-slate-200 text-slate-700 transition-colors shadow-sm" title="Alejar"><IconZoomOut /></button>
                                        <button onClick={resetView} className="w-10 h-10 bg-slate-50 border border-slate-200 rounded flex items-center justify-center hover:bg-slate-200 text-slate-700 transition-colors shadow-sm" title="Centrar Visor"><IconReset /></button>
                                    </div>
                                </div>

                                {/* Contenedor del Canvas SVG */}
                                <div 
                                    className="flex-1 relative w-full h-full bg-white bg-grid overflow-hidden flex items-center justify-center"
                                    ref={svgContainerRef}
                                    onWheel={handleWheel}
                                    onMouseDown={handleMouseDown}
                                    onMouseMove={handleMouseMove}
                                    onMouseUp={() => setIsDragging(false)}
                                    onMouseLeave={() => setIsDragging(false)}
                                >
                                    {(currentGraphic || currentLine) ? (
                                        <svg className={`absolute inset-0 w-full h-full block ${isDragging ? 'cursor-grabbing' : 'cursor-grab'}`}>
                                            
                                            {/* Origen Desplazable */}
                                            <g transform={`translate(${transform.x}, ${transform.y})`}>
                                                
                                                {/* Cuadrícula Dinámica */}
                                                <g stroke="#e2e8f0" strokeWidth={1 / transform.scale} transform={`scale(${transform.scale}, ${-transform.scale})`}>
                                                    {Array.from({length: 41}).map((_, i) => {
                                                        const pos = (i - 20) * 10;
                                                        return (
                                                            <React.Fragment key={`grid-${i}`}>
                                                                <line x1={pos} y1="-200" x2={pos} y2="200" />
                                                                <line x1="-200" y1={pos} x2="200" y2={pos} />
                                                            </React.Fragment>
                                                        )
                                                    })}
                                                </g>

                                                {/* Ejes Centrales (0,0) */}
                                                <line x1="-5000" y1="0" x2="5000" y2="0" stroke="#94a3b8" strokeWidth="1" strokeDasharray="4,4" />
                                                <line x1="0" y1="-5000" x2="0" y2="5000" stroke="#94a3b8" strokeWidth="1" strokeDasharray="4,4" />
                                                <circle cx="0" cy="0" r="4" fill="#ef4444" opacity="0.8" />
                                                
                                                {/* Dibujo de la Geometría */}
                                                <g transform={`scale(${transform.scale}, ${-transform.scale})`}>
                                                    {renderGraphicElements(currentGraphic, currentLine)}

                                                    {/* Puntos de conexión (Puertos) */}
                                                    {(() => {
                                                        try {
                                                            if (currentClass?.ports && Array.isArray(currentClass.ports)) {
                                                                return currentClass.ports.map((port, i) => {
                                                                    if (port.x == null || port.y == null) return null;
                                                                    return (
                                                                        <g key={`port-${i}`} transform={`translate(${port.x}, ${port.y})`}>
                                                                            <circle cx="0" cy="0" r={4 / transform.scale} fill="none" stroke="#3b82f6" strokeWidth={1.5 / transform.scale} />
                                                                            <circle cx="0" cy="0" r={1.5 / transform.scale} fill="#3b82f6" />
                                                                        </g>
                                                                    );
                                                                });
                                                            }
                                                        } catch(e) { return null; }
                                                        return null;
                                                    })()}
                                                </g>
                                            </g>
                                        </svg>
                                    ) : (
                                        <div className="bg-slate-800 text-white px-8 py-6 rounded-2xl shadow-2xl flex flex-col items-center pointer-events-none">
                                            <IconImage className="w-12 h-12 mb-3 text-slate-400" />
                                            <span className="font-bold text-xl">Sin Diseño Visual</span>
                                            <span className="text-sm text-slate-400 mt-2">Este elemento existe pero no tiene un gráfico en los diccionarios.</span>
                                        </div>
                                    )}

                                    {/* Leyenda y Coordenadas Flotantes */}
                                    <div className="absolute bottom-6 right-6 bg-white/95 backdrop-blur border border-slate-200 p-4 rounded-xl shadow-2xl text-xs text-slate-600 pointer-events-none">
                                        <div className="flex items-center gap-3 mb-2 font-mono font-bold text-slate-800 border-b border-slate-100 pb-2">
                                            X: {Math.round(transform.x)} | Y: {Math.round(transform.y)} | Zoom: {transform.scale.toFixed(1)}x
                                        </div>
                                        <div className="flex items-center gap-2 mb-1"><span className="w-3 h-3 rounded-full bg-red-500 opacity-80 block"></span> Centro de Origen (0,0)</div>
                                        <div className="flex items-center gap-2"><span className="w-3 h-3 rounded-full border-2 border-blue-500 flex items-center justify-center"><span className="w-1 h-1 bg-blue-500 rounded-full"></span></span> Punto de Conexión de red</div>
                                    </div>
                                </div>
                            </>
                        ) : (
                            <div className="flex-1 flex items-center justify-center flex-col h-full w-full opacity-50 pointer-events-none">
                                <IconSearch className="w-24 h-24 mb-6 text-slate-300" />
                                <p className="text-2xl font-bold text-slate-400">Selecciona una figura en el catálogo</p>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
